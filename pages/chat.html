<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DoorSkill — Messages</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --rose:#F43F5E;
  --rose-lt:#FFE4EC;
  --rose-md:#FB7185;
  --pink-bg:#FFF0F5;
  --dark:#1A0A14;
  --mid:#5C3D4E;
  --muted:#9D7589;
  --border:#F3D6E0;
  --green:#10B981;
  --green-lt:#D1FAE5;
  --blue:#3B82F6;
  --blue-lt:#DBEAFE;
  --white:#fff;
  --sidebar-w:320px;
  --topbar-h:60px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  height:100%;
  font-family:'DM Sans',sans-serif;
  color:var(--dark);
  overflow:hidden;
  background:#FFF5F7;
}

/* ── TOPBAR ── */
.topbar{
  height:var(--topbar-h);
  background:#fff;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;
  padding:0 16px;gap:12px;
  position:fixed;top:0;left:0;right:0;
  z-index:100;
  box-shadow:0 2px 8px rgba(244,63,94,.07);
}
.tb-back{
  background:transparent;border:none;
  font-size:20px;cursor:pointer;
  color:var(--mid);padding:6px;
  border-radius:8px;transition:all .2s;
  display:flex;align-items:center;gap:6px;
  font-family:'DM Sans',sans-serif;
  font-size:14px;font-weight:600;
}
.tb-back:hover{background:var(--rose-lt);color:var(--rose);}
.logo{
  font-family:'Playfair Display',serif;
  font-size:18px;font-weight:900;
  color:var(--rose);text-decoration:none;
}
.logo span{color:var(--dark);}
.tb-title{
  font-size:16px;font-weight:700;color:var(--dark);
  display:none;
}
.tb-right{
  margin-left:auto;
  display:flex;align-items:center;gap:8px;
}
.tb-user-info{
  display:flex;align-items:center;gap:8px;
  font-size:13px;color:var(--muted);
}
.tb-avatar{
  width:34px;height:34px;border-radius:9px;
  background:var(--rose-lt);
  display:flex;align-items:center;justify-content:center;
  font-size:15px;overflow:hidden;flex-shrink:0;
  border:1.5px solid var(--border);
}
.tb-avatar img{width:100%;height:100%;object-fit:cover;}

/* ── MAIN LAYOUT ── */
.chat-layout{
  display:flex;
  height:calc(100vh - var(--topbar-h));
  margin-top:var(--topbar-h);
}

/* ═══════════════════════════
   LEFT — CONVERSATIONS LIST
═══════════════════════════ */
.conv-sidebar{
  width:var(--sidebar-w);
  flex-shrink:0;
  background:#fff;
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.cs-head{
  padding:14px 16px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;
  justify-content:space-between;
  flex-shrink:0;
}
.cs-title{
  font-family:'Playfair Display',serif;
  font-size:17px;font-weight:900;color:var(--dark);
}
.cs-count{
  font-size:12px;color:var(--muted);
  background:var(--rose-lt);color:var(--rose);
  padding:3px 9px;border-radius:999px;font-weight:600;
}

/* Search */
.cs-search{
  padding:10px 14px;border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.cs-search input{
  width:100%;padding:8px 14px;
  border:1.5px solid var(--border);
  border-radius:10px;font-size:13px;
  font-family:'DM Sans',sans-serif;
  color:var(--dark);outline:none;
  background:#fff;transition:border .2s;
}
.cs-search input:focus{border-color:var(--rose);}
.cs-search input::placeholder{color:var(--muted);}

/* Conv list */
.conv-list{
  flex:1;overflow-y:auto;
}
.conv-item{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;cursor:pointer;
  border-bottom:1px solid var(--pink-bg);
  transition:background .15s;
  position:relative;
}
.conv-item:hover{background:var(--pink-bg);}
.conv-item.active{
  background:var(--rose-lt);
  border-right:3px solid var(--rose);
}
.conv-item:last-child{border-bottom:none;}
.ci-avatar{
  width:46px;height:46px;border-radius:12px;
  background:var(--rose-lt);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;overflow:hidden;
  position:relative;border:1.5px solid var(--border);
}
.ci-avatar img{width:100%;height:100%;object-fit:cover;}
.ci-online{
  position:absolute;bottom:1px;right:1px;
  width:11px;height:11px;border-radius:50%;
  background:var(--green);border:2px solid #fff;
}
.ci-body{flex:1;min-width:0;}
.ci-name{
  font-size:14px;font-weight:700;color:var(--dark);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.ci-last{
  font-size:12px;color:var(--muted);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  margin-top:2px;
}
.ci-last.unread{color:var(--dark);font-weight:600;}
.ci-meta{
  display:flex;flex-direction:column;
  align-items:flex-end;gap:4px;
  flex-shrink:0;
}
.ci-time{font-size:11px;color:var(--muted);}
.ci-badge{
  background:var(--rose);color:#fff;
  font-size:10px;font-weight:700;
  width:18px;height:18px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
}
.ci-job{
  font-size:10px;color:var(--rose);
  background:var(--rose-lt);
  padding:2px 7px;border-radius:999px;
  font-weight:600;margin-top:2px;
  white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;max-width:140px;
}

/* Empty conv list */
.conv-empty{
  text-align:center;padding:48px 20px;color:var(--muted);
}
.conv-empty-icon{font-size:44px;margin-bottom:10px;}
.conv-empty-title{
  font-size:15px;font-weight:700;color:var(--dark);margin-bottom:6px;
}
.conv-empty-sub{font-size:13px;line-height:1.6;}

/* ═══════════════════════════
   RIGHT — CHAT WINDOW
═══════════════════════════ */
.chat-window{
  flex:1;display:flex;flex-direction:column;
  overflow:hidden;background:#FFF5F7;
  position:relative;
}

/* No chat selected */
.no-chat{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;padding:40px;color:var(--muted);
}
.no-chat-icon{font-size:64px;margin-bottom:16px;}
.no-chat-title{
  font-family:'Playfair Display',serif;
  font-size:22px;font-weight:900;color:var(--dark);
  margin-bottom:8px;
}
.no-chat-sub{font-size:14px;line-height:1.7;max-width:320px;}

/* Chat header */
.chat-header{
  background:#fff;border-bottom:1px solid var(--border);
  padding:12px 16px;
  display:flex;align-items:center;gap:12px;
  flex-shrink:0;
  box-shadow:0 2px 8px rgba(0,0,0,.04);
}
.ch-back{
  display:none;background:none;border:none;
  font-size:20px;cursor:pointer;color:var(--mid);
  padding:4px;border-radius:6px;
}
.ch-avatar{
  width:44px;height:44px;border-radius:11px;
  background:var(--rose-lt);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;overflow:hidden;
  border:1.5px solid var(--border);
  position:relative;
}
.ch-avatar img{width:100%;height:100%;object-fit:cover;}
.ch-online-dot{
  position:absolute;bottom:1px;right:1px;
  width:10px;height:10px;border-radius:50%;
  background:var(--green);border:2px solid #fff;
}
.ch-info{flex:1;}
.ch-name{
  font-size:15px;font-weight:700;color:var(--dark);
}
.ch-status{font-size:12px;color:var(--muted);}
.ch-status.online{color:var(--green);font-weight:600;}
.ch-actions{
  display:flex;align-items:center;gap:8px;
}
.ch-btn{
  padding:7px 14px;border-radius:8px;
  border:1.5px solid var(--border);
  background:transparent;
  font-size:13px;font-weight:600;
  color:var(--mid);cursor:pointer;
  font-family:'DM Sans',sans-serif;
  transition:all .2s;
  display:flex;align-items:center;gap:5px;
}
.ch-btn:hover{border-color:var(--rose);color:var(--rose);}
.ch-btn.call{
  background:var(--rose);color:#fff;border-color:var(--rose);
}
.ch-btn.call:hover{background:#e0334f;}
.ch-job-tag{
  font-size:11px;color:var(--rose);
  background:var(--rose-lt);
  padding:3px 8px;border-radius:999px;
  font-weight:600;
}

/* Messages area */
.messages-area{
  flex:1;overflow-y:auto;
  padding:16px 20px;
  display:flex;flex-direction:column;
  gap:4px;
  scroll-behavior:smooth;
}

/* Date divider */
.date-divider{
  text-align:center;margin:10px 0;
  position:relative;
}
.date-divider::before,.date-divider::after{
  content:'';position:absolute;top:50%;
  width:calc(50% - 60px);height:1px;
  background:var(--border);
}
.date-divider::before{left:0;}
.date-divider::after{right:0;}
.date-divider span{
  font-size:11px;color:var(--muted);
  background:var(--pink-bg);
  padding:3px 12px;border-radius:999px;
  font-weight:500;
}

/* Message bubble */
.msg-wrap{
  display:flex;gap:8px;
  max-width:72%;
  animation:msgIn .2s ease;
}
@keyframes msgIn{
  from{opacity:0;transform:translateY(8px);}
  to{opacity:1;transform:translateY(0);}
}
.msg-wrap.mine{
  align-self:flex-end;flex-direction:row-reverse;
}
.msg-wrap.theirs{align-self:flex-start;}
.msg-avatar{
  width:30px;height:30px;border-radius:8px;
  background:var(--rose-lt);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;overflow:hidden;
  align-self:flex-end;border:1.5px solid var(--border);
}
.msg-avatar img{width:100%;height:100%;object-fit:cover;}
.msg-bubble{
  padding:10px 14px;border-radius:16px;
  font-size:14px;line-height:1.5;
  max-width:100%;word-break:break-word;
  position:relative;
}
.msg-wrap.theirs .msg-bubble{
  background:#fff;color:var(--dark);
  border:1.5px solid var(--border);
  border-bottom-left-radius:4px;
  box-shadow:0 2px 8px rgba(0,0,0,.05);
}
.msg-wrap.mine .msg-bubble{
  background:var(--rose);color:#fff;
  border-bottom-right-radius:4px;
  box-shadow:0 2px 8px rgba(244,63,94,.25);
}
.msg-time{
  font-size:10px;margin-top:4px;
  color:var(--muted);
}
.msg-wrap.mine .msg-time{
  text-align:right;color:rgba(255,255,255,.7);
}
.msg-status{
  font-size:10px;
  color:rgba(255,255,255,.7);
}

/* Typing indicator */
.typing-indicator{
  display:none;align-self:flex-start;
  padding:10px 16px;background:#fff;
  border:1.5px solid var(--border);
  border-radius:16px;border-bottom-left-radius:4px;
  box-shadow:0 2px 8px rgba(0,0,0,.05);
  gap:4px;align-items:center;
}
.typing-indicator.show{display:flex;}
.typing-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--muted);
  animation:typingBounce .8s infinite;
}
.typing-dot:nth-child(2){animation-delay:.15s;}
.typing-dot:nth-child(3){animation-delay:.3s;}
@keyframes typingBounce{
  0%,80%,100%{transform:translateY(0);}
  40%{transform:translateY(-6px);}
}

/* Scroll to bottom btn */
.scroll-bottom{
  position:absolute;bottom:80px;right:20px;
  background:var(--rose);color:#fff;
  border:none;border-radius:50%;
  width:40px;height:40px;
  display:none;align-items:center;justify-content:center;
  cursor:pointer;font-size:18px;
  box-shadow:0 4px 16px rgba(244,63,94,.35);
  z-index:10;transition:all .2s;
}
.scroll-bottom.show{display:flex;}
.scroll-bottom:hover{background:#e0334f;transform:scale(1.05);}
.scroll-bottom-badge{
  position:absolute;top:-4px;right:-4px;
  background:var(--dark);color:#fff;
  font-size:9px;font-weight:700;
  width:16px;height:16px;border-radius:50%;
  display:none;align-items:center;justify-content:center;
}

/* Input bar */
.input-bar{
  background:#fff;border-top:1px solid var(--border);
  padding:12px 16px;flex-shrink:0;
  display:flex;align-items:flex-end;gap:8px;
}
.input-bar textarea{
  flex:1;padding:11px 14px;
  border:1.5px solid var(--border);border-radius:12px;
  font-size:14px;font-family:'DM Sans',sans-serif;
  color:var(--dark);outline:none;resize:none;
  max-height:120px;line-height:1.5;
  transition:border .2s;background:#fff;
  min-height:44px;
}
.input-bar textarea:focus{
  border-color:var(--rose);
  box-shadow:0 0 0 3px var(--rose-lt);
}
.input-bar textarea::placeholder{color:var(--muted);}
.send-btn{
  width:44px;height:44px;flex-shrink:0;
  border:none;border-radius:12px;
  background:var(--rose);color:#fff;
  font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.send-btn:hover{
  background:#e0334f;transform:scale(1.05);
}
.send-btn:disabled{opacity:.5;transform:none;cursor:not-allowed;}

/* Char count */
.char-count{
  font-size:11px;color:var(--muted);
  align-self:flex-end;margin-bottom:4px;
  flex-shrink:0;
}

/* Loading spinner in messages */
.msg-loading{
  display:flex;justify-content:center;
  align-items:center;padding:48px;flex:1;
}
.spinner{
  width:36px;height:36px;
  border:3px solid var(--rose-lt);
  border-top-color:var(--rose);
  border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* Toast */
.toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--dark);color:#fff;
  padding:11px 20px;border-radius:10px;
  font-size:13px;font-weight:500;
  opacity:0;transition:all .3s;z-index:9999;
  border-left:3px solid var(--rose);
  white-space:nowrap;
}
.toast.show{
  opacity:1;transform:translateX(-50%) translateY(0);
}

/* ── MOBILE ── */
@media(max-width:700px){
  .conv-sidebar{
    position:fixed;left:0;top:var(--topbar-h);bottom:0;
    z-index:200;transform:translateX(0);
    width:100%;
    transition:transform .3s;
  }
  .conv-sidebar.hidden{transform:translateX(-100%);}
  .chat-window{
    position:fixed;left:0;top:var(--topbar-h);
    right:0;bottom:0;z-index:199;
    transform:translateX(100%);
    transition:transform .3s;
  }
  .chat-window.active{transform:translateX(0);}
  .ch-back{display:block;}
  .tb-title{display:block;}
  .logo{display:none;}
  .ch-actions .ch-btn:not(.call){display:none;}
}
</style>
</head>
<body>

<!-- ── TOPBAR ── -->
<div class="topbar">
  <button class="tb-back" onclick="goBack()">
    ← Back
  </button>
  <a href="../index.html" class="logo">Door<span>Skill</span></a>
  <span class="tb-title">💬 Messages</span>
  <div class="tb-right">
    <div class="tb-user-info">
      <div class="tb-avatar" id="tbAvatar">👤</div>
      <span id="tbName" style="display:none;"></span>
    </div>
  </div>
</div>

<!-- ── MAIN LAYOUT ── -->
<div class="chat-layout">

  <!-- ════════════════════════
       LEFT: CONVERSATIONS
  ════════════════════════ -->
  <div class="conv-sidebar" id="convSidebar">

    <div class="cs-head">
      <div class="cs-title">💬 Messages</div>
      <span class="cs-count" id="convCount">0</span>
    </div>

    <div class="cs-search">
      <input type="text" id="convSearch"
             placeholder="Search conversations..."
             oninput="filterConvs(this.value)"/>
    </div>

    <div class="conv-list" id="convList">
      <div class="conv-empty">
        <div class="conv-empty-icon">💬</div>
        <div class="conv-empty-title">Loading chats...</div>
      </div>
    </div>

  </div>

  <!-- ════════════════════════
       RIGHT: CHAT WINDOW
  ════════════════════════ -->
  <div class="chat-window" id="chatWindow">

    <!-- No chat selected -->
    <div class="no-chat" id="noChat">
      <div class="no-chat-icon">💬</div>
      <div class="no-chat-title">Select a Conversation</div>
      <div class="no-chat-sub">
        Choose a conversation from the left to start chatting
        with workers or clients securely inside DoorSkill.
      </div>
    </div>

    <!-- Active Chat (hidden by default) -->
    <div id="activeChatArea"
         style="display:none;flex-direction:column;flex:1;overflow:hidden;display:none;">

      <!-- Chat Header -->
      <div class="chat-header">
        <button class="ch-back" onclick="backToList()">←</button>
        <div class="ch-avatar" id="chAvatar">
          <img id="chAvatarImg" alt=""/>
          <span id="chAvatarEmoji">👤</span>
          <div class="ch-online-dot" id="chOnlineDot"
               style="display:none;"></div>
        </div>
        <div class="ch-info">
          <div class="ch-name" id="chName">—</div>
          <div class="ch-status" id="chStatus">—</div>
        </div>
        <div class="ch-actions">
          <span class="ch-job-tag" id="chJobTag"
                style="display:none;">—</span>
          <button class="ch-btn call" id="callBtn"
                  onclick="goCall()"
                  style="display:none;">
            📞 Call
          </button>
        </div>
      </div>

      <!-- Messages -->
      <div class="messages-area" id="messagesArea"
           onscroll="handleScroll()">
        <div class="msg-loading" id="msgLoading">
          <div class="spinner"></div>
        </div>
      </div>

      <!-- Typing indicator -->
      <div class="typing-indicator" id="typingIndicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>

      <!-- Scroll to bottom button -->
      <button class="scroll-bottom" id="scrollBtn"
              onclick="scrollToBottom()">
        ↓
      </button>

      <!-- Input Bar -->
      <div class="input-bar">
        <textarea
          id="msgInput"
          placeholder="Type a message..."
          rows="1"
          maxlength="1000"
          oninput="onMsgInput(this)"
          onkeydown="msgKeydown(event)">
        </textarea>
        <span class="char-count" id="charCount">0/1000</span>
        <button class="send-btn" id="sendBtn"
                onclick="sendMessage()"
                disabled>
          ➤
        </button>
      </div>

    </div>

  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- ══════════════════════════════════
     FIREBASE
══════════════════════════════════ -->
<script type="module">
import { initializeApp }
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {
  getFirestore,
  doc,
  getDoc,
  getDocs,
  addDoc,
  updateDoc,
  setDoc,
  collection,
  query,
  where,
  orderBy,
  onSnapshot,
  serverTimestamp,
  limit
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// ── Init ──
const app = initializeApp({
  apiKey:            "AIzaSyDLPAfokHz2ZHdRh8ppAEsdWHCkeloI1g0",
  authDomain:        "doorskill-beff1.firebaseapp.com",
  databaseURL:       "https://doorskill-beff1-default-rtdb.firebaseio.com",
  projectId:         "doorskill-beff1",
  storageBucket:     "doorskill-beff1.firebasestorage.app",
  messagingSenderId: "620272735898",
  appId:             "1:620272735898:web:b35d24737ef79c01a67123"
});

const auth = getAuth(app);
const db   = getFirestore(app);

// ── App State ──
let _uid         = null;
let _role        = null;
let _myData      = null;
let _currentChat = null; // { chatId, otherUid, otherData }
let _unsubMsgs   = null; // unsubscribe messages listener
let _unsubChats  = null; // unsubscribe chats listener
let _allConvs    = [];   // all loaded conversations
let _newMsgCount = 0;

// ─────────────────────────────────
// AUTH CHECK
// ─────────────────────────────────
onAuthStateChanged(auth, async user => {
  if(!user){
    window.location.href = '../auth/login.html';
    return;
  }
  _uid  = user.uid;
  _role = localStorage.getItem('ds_role') || 'client';

  // Load my profile
  const col = _role === 'worker' ? 'workers' : 'clients';
  const snap = await getDoc(doc(db, col, _uid));
  if(snap.exists()){
    _myData = snap.data();
  } else {
    // Try other collection
    const alt = _role === 'worker' ? 'clients' : 'workers';
    const snap2 = await getDoc(doc(db, alt, _uid));
    if(snap2.exists()){
      _myData = snap2.data();
      _role = alt === 'workers' ? 'worker' : 'client';
    }
  }

  // Update topbar
  if(_myData){
    const tbAv = document.getElementById('tbAvatar');
    if(_myData.photoURL){
      tbAv.innerHTML =
        `<img src="${_myData.photoURL}" alt=""
              style="width:100%;height:100%;object-fit:cover;"/>`;
    } else {
      tbAv.textContent = _role === 'worker' ? '👷' : '👤';
    }
  }

  // Listen to all conversations
  listenConversations();

  // Handle URL params — open chat directly
  handleURLParams();
});

// ─────────────────────────────────
// HANDLE URL PARAMS
// ?worker=uid → client opens chat with worker
// ?job=jobId&worker=uid → from job context
// ?job=jobId&client=uid → worker opens chat
// ─────────────────────────────────
async function handleURLParams(){
  const params  = new URLSearchParams(window.location.search);
  const workerP = params.get('worker');
  const clientP = params.get('client');
  const jobP    = params.get('job');

  let otherUid  = null;
  let jobId     = jobP || null;

  if(_role === 'client' && workerP){
    otherUid = workerP;
  } else if(_role === 'worker' && clientP){
    otherUid = clientP;
  } else if(workerP){
    otherUid = workerP;
  } else if(clientP){
    otherUid = clientP;
  }

  if(otherUid && otherUid !== _uid){
    // Open or create chat
    await openOrCreateChat(otherUid, jobId);
  }
}

// ─────────────────────────────────
// OPEN OR CREATE CHAT
// ─────────────────────────────────
async function openOrCreateChat(otherUid, jobId = null){
  // Build deterministic chatId from both UIDs
  const ids  = [_uid, otherUid].sort();
  let chatId = ids.join('_');
  if(jobId) chatId = jobId + '_' + chatId;

  // Check if chat doc exists
  const chatRef  = doc(db, 'chats', chatId);
  const chatSnap = await getDoc(chatRef);

  // Get other user's profile
  let otherData = null;
  for(const col of ['workers','clients']){
    const s = await getDoc(doc(db, col, otherUid));
    if(s.exists()){ otherData = { id: otherUid, ...s.data() }; break; }
  }
  if(!otherData) otherData = { id: otherUid, fullName: 'User', photoURL: '' };

  if(!chatSnap.exists()){
    // Create new chat doc
    const isMe_worker = _role === 'worker';
    const workerUid   = isMe_worker ? _uid : otherUid;
    const clientUid   = isMe_worker ? otherUid : _uid;
    const workerName  = isMe_worker
      ? (_myData?.fullName || 'Worker')
      : (otherData?.fullName || 'Worker');
    const clientName  = isMe_worker
      ? (otherData?.fullName || 'Client')
      : (_myData?.fullName || 'Client');

    // Get job title if jobId given
    let jobTitle = '';
    if(jobId){
      try {
        const jSnap = await getDoc(doc(db,'jobs',jobId));
        if(jSnap.exists()) jobTitle = jSnap.data().title || '';
      } catch(e){}
    }

    await setDoc(chatRef, {
      chatId,
      workerUid,
      clientUid,
      workerName,
      clientName,
      workerPhoto: isMe_worker
        ? (_myData?.photoURL || '')
        : (otherData?.photoURL || ''),
      clientPhoto: isMe_worker
        ? (otherData?.photoURL || '')
        : (_myData?.photoURL || ''),
      jobId:        jobId   || null,
      jobTitle:     jobTitle || null,
      lastMessage:  '',
      lastTime:     serverTimestamp(),
      workerUnread: 0,
      clientUnread: 0,
      createdAt:    serverTimestamp(),
    });
  }

  // Open this chat
  openChat(chatId, otherData, jobId);
}

// ─────────────────────────────────
// LISTEN CONVERSATIONS (real-time)
// ─────────────────────────────────
function listenConversations(){
  if(_unsubChats) _unsubChats();

  // Query chats where I am involved
  const field = _role === 'worker' ? 'workerUid' : 'clientUid';
  const q = query(
    collection(db, 'chats'),
    where(field, '==', _uid),
    orderBy('lastTime', 'desc')
  );

  _unsubChats = onSnapshot(q, snap => {
    _allConvs = [];
    snap.forEach(d => _allConvs.push({ id: d.id, ...d.data() }));
    renderConvList(_allConvs);

    // If URL param opened a chat, highlight it
    if(_currentChat){
      highlightConv(_currentChat.chatId);
    }
  }, err => {
    console.error('Chat listener error:', err);
    renderConvListError();
  });
}

// ─────────────────────────────────
// RENDER CONVERSATION LIST
// ─────────────────────────────────
function renderConvList(convs){
  const list = document.getElementById('convList');
  document.getElementById('convCount').textContent = convs.length;

  if(!convs.length){
    list.innerHTML = `
      <div class="conv-empty">
        <div class="conv-empty-icon">💬</div>
        <div class="conv-empty-title">No conversations yet</div>
        <div class="conv-empty-sub">
          Find a worker and send them a message!
        </div>
      </div>`;
    return;
  }

  list.innerHTML = convs.map(c => {
    // Figure out the other person's info
    const isWorker   = _role === 'worker';
    const otherName  = isWorker ? (c.clientName||'Client') : (c.workerName||'Worker');
    const otherPhoto = isWorker ? (c.clientPhoto||'') : (c.workerPhoto||'');
    const otherUid   = isWorker ? c.clientUid : c.workerUid;
    const unreadCount= isWorker ? (c.workerUnread||0) : (c.clientUnread||0);
    const lastMsg    = c.lastMessage || 'Tap to start chatting';
    const lastTime   = c.lastTime?.toDate ?
      formatTime(c.lastTime.toDate()) : '';
    const initials   = otherName.charAt(0).toUpperCase();
    const isActive   = _currentChat?.chatId === c.id;
    const jobTitle   = c.jobTitle || '';

    const avatarHtml = otherPhoto
      ? `<img src="${otherPhoto}" alt=""
              onerror="this.style.display='none'"
              onload="this.style.display='block'"
              style="width:100%;height:100%;object-fit:cover;"/>`
      : initials;

    return `
    <div class="conv-item ${isActive ? 'active' : ''}"
         id="conv-${c.id}"
         onclick="convClick('${c.id}','${escapeAttr(otherUid)}')">
      <div class="ci-avatar">
        ${avatarHtml}
      </div>
      <div class="ci-body">
        <div class="ci-name">${otherName}</div>
        ${jobTitle
          ? `<div class="ci-job">📋 ${truncate(jobTitle,24)}</div>`
          : ''}
        <div class="ci-last ${unreadCount > 0 ? 'unread' : ''}">
          ${truncate(lastMsg, 38)}
        </div>
      </div>
      <div class="ci-meta">
        <div class="ci-time">${lastTime}</div>
        ${unreadCount > 0
          ? `<div class="ci-badge">${unreadCount > 9 ? '9+' : unreadCount}</div>`
          : ''}
      </div>
    </div>`;
  }).join('');
}

function renderConvListError(){
  document.getElementById('convList').innerHTML = `
    <div class="conv-empty">
      <div class="conv-empty-icon">⚠️</div>
      <div class="conv-empty-title">Could not load chats</div>
      <div class="conv-empty-sub">
        Please check your connection and try again.
      </div>
    </div>`;
}

// ─────────────────────────────────
// CONVERSATION CLICK
// ─────────────────────────────────
window.convClick = async function(chatId, otherUid){
  // Get other user data from conv
  const conv = _allConvs.find(c => c.id === chatId);
  if(!conv) return;

  const isWorker  = _role === 'worker';
  const otherName = isWorker ? conv.clientName : conv.workerName;
  const otherPhoto= isWorker ? conv.clientPhoto : conv.workerPhoto;
  const otherData = {
    id: otherUid,
    fullName: otherName,
    photoURL: otherPhoto,
    uid: otherUid,
  };

  openChat(chatId, otherData, conv.jobId);
};

// ─────────────────────────────────
// OPEN CHAT
// ─────────────────────────────────
function openChat(chatId, otherData, jobId = null){
  _currentChat = { chatId, otherUid: otherData.id, otherData, jobId };

  // Update header
  const img   = document.getElementById('chAvatarImg');
  const emoji = document.getElementById('chAvatarEmoji');
  if(otherData.photoURL){
    img.src = otherData.photoURL;
    img.style.display   = 'block';
    emoji.style.display = 'none';
  } else {
    img.style.display   = 'none';
    emoji.style.display = 'block';
    emoji.textContent   = _role === 'worker' ? '👤' : '👷';
  }

  document.getElementById('chName').textContent =
    otherData.fullName || 'User';

  // Online status from conv data
  const conv = _allConvs.find(c => c.id === chatId);
  const isOnline = otherData.isOnline || false;
  const statusEl = document.getElementById('chStatus');
  const dotEl    = document.getElementById('chOnlineDot');
  if(isOnline){
    statusEl.textContent = 'Online now';
    statusEl.className   = 'ch-status online';
    dotEl.style.display  = 'block';
  } else {
    statusEl.textContent = 'Tap to chat';
    statusEl.className   = 'ch-status';
    dotEl.style.display  = 'none';
  }

  // Job tag
  const jobTag = document.getElementById('chJobTag');
  if(conv?.jobTitle){
    jobTag.textContent   = '📋 ' + truncate(conv.jobTitle, 20);
    jobTag.style.display = 'flex';
  } else {
    jobTag.style.display = 'none';
  }

  // Call button — show if job exists
  const callBtn = document.getElementById('callBtn');
  if(conv?.jobId){
    callBtn.style.display = 'flex';
    window._chatJobId = conv.jobId;
  } else {
    callBtn.style.display = 'none';
  }

  // Highlight in list
  highlightConv(chatId);

  // Show chat area
  document.getElementById('noChat').style.display          = 'none';
  document.getElementById('activeChatArea').style.display  = 'flex';
  document.getElementById('activeChatArea').style.flexDirection = 'column';

  // Mobile: show chat window
  document.getElementById('chatWindow').classList.add('active');
  document.getElementById('convSidebar').classList.add('hidden');

  // Mark as read
  markAsRead(chatId);

  // Listen to messages
  listenMessages(chatId);
}

function highlightConv(chatId){
  document.querySelectorAll('.conv-item')
          .forEach(el => el.classList.remove('active'));
  const el = document.getElementById('conv-'+chatId);
  if(el) el.classList.add('active');
}

// ─────────────────────────────────
// LISTEN MESSAGES (real-time)
// ─────────────────────────────────
function listenMessages(chatId){
  // Unsub previous
  if(_unsubMsgs) _unsubMsgs();

  const msgArea = document.getElementById('messagesArea');
  msgArea.innerHTML = `<div class="msg-loading"><div class="spinner"></div></div>`;
  _newMsgCount = 0;

  const q = query(
    collection(db, 'chats', chatId, 'messages'),
    orderBy('createdAt', 'asc'),
    limit(200)
  );

  _unsubMsgs = onSnapshot(q, snap => {
    if(snap.empty){
      msgArea.innerHTML = renderEmptyChat();
      return;
    }

    let html     = '';
    let lastDate = '';
    let isAtBottom = isScrolledToBottom();

    snap.forEach(d => {
      const msg  = { id: d.id, ...d.data() };
      const mine = msg.senderId === _uid;
      const date = msg.createdAt?.toDate ?
        formatDate(msg.createdAt.toDate()) : '';

      // Date divider
      if(date && date !== lastDate){
        html += `<div class="date-divider">
                   <span>${date}</span>
                 </div>`;
        lastDate = date;
      }

      const time = msg.createdAt?.toDate ?
        formatTimeFull(msg.createdAt.toDate()) : '';
      const otherPhoto = _currentChat?.otherData?.photoURL || '';

      html += `
      <div class="msg-wrap ${mine ? 'mine' : 'theirs'}"
           id="msg-${msg.id}">
        ${!mine
          ? `<div class="msg-avatar">
               ${otherPhoto
                ? `<img src="${otherPhoto}" alt=""
                        onerror="this.style.display='none'"
                        onload="this.style.display='block'"/>`
                : '👤'}
             </div>`
          : ''}
        <div>
          <div class="msg-bubble">${escapeHtml(msg.text)}</div>
          <div class="msg-time">
            ${time}
            ${mine
              ? `<span class="msg-status">
                   ${msg.read ? '✓✓' : '✓'}
                 </span>`
              : ''}
          </div>
        </div>
      </div>`;
    });

    msgArea.innerHTML = html;

    // Scroll behavior
    if(isAtBottom || snap.docChanges().some(
       c => c.type === 'added' && c.doc.data().senderId === _uid
    )){
      scrollToBottom();
      document.getElementById('scrollBtn').classList.remove('show');
      _newMsgCount = 0;
    } else {
      // Count new incoming msgs
      const newMsgs = snap.docChanges().filter(
        c => c.type === 'added' && c.doc.data().senderId !== _uid
      );
      if(newMsgs.length > 0){
        _newMsgCount += newMsgs.length;
        document.getElementById('scrollBtn').classList.add('show');
      }
    }

    // Mark as read
    markAsRead(chatId);
  }, err => {
    console.error('Messages listener error:', err);
    msgArea.innerHTML = `
      <div style="text-align:center;padding:48px;color:var(--muted);">
        <div style="font-size:36px;margin-bottom:10px;">⚠️</div>
        <div>Could not load messages. Please refresh.</div>
      </div>`;
  });
}

function renderEmptyChat(){
  const name = _currentChat?.otherData?.fullName || 'them';
  return `
    <div style="text-align:center;padding:60px 20px;
                color:var(--muted);flex:1;">
      <div style="font-size:56px;margin-bottom:14px;">👋</div>
      <div style="font-size:16px;font-weight:700;color:var(--dark);
                  margin-bottom:8px;">
        Say hello to ${name}!
      </div>
      <div style="font-size:13px;line-height:1.7;">
        This is the beginning of your conversation.<br/>
        Messages are private and secure.
      </div>
    </div>`;
}

// ─────────────────────────────────
// SEND MESSAGE
// ─────────────────────────────────
window.sendMessage = async function(){
  if(!_currentChat) return;

  const input = document.getElementById('msgInput');
  const text  = input.value.trim();
  if(!text) return;

  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  input.value  = '';
  autoResize(input);
  updateCharCount('');
  document.getElementById('sendBtn').disabled = true;

  try {
    const chatId      = _currentChat.chatId;
    const isWorker    = _role === 'worker';
    const otherUnread = isWorker ? 'clientUnread' : 'workerUnread';

    // Add message to subcollection
    await addDoc(
      collection(db, 'chats', chatId, 'messages'),
      {
        text,
        senderId:   _uid,
        senderName: _myData?.fullName || 'User',
        senderPhoto:_myData?.photoURL || '',
        read:       false,
        createdAt:  serverTimestamp(),
      }
    );

    // Update chat doc: lastMessage, lastTime, unread count
    const chatRef = doc(db, 'chats', chatId);
    const chatSnap= await getDoc(chatRef);
    const current = chatSnap.data() || {};
    const curUnread = current[otherUnread] || 0;

    await updateDoc(chatRef, {
      lastMessage: text.length > 60 ? text.slice(0,60)+'...' : text,
      lastTime:    serverTimestamp(),
      [otherUnread]: curUnread + 1,
    });

  } catch(err){
    showToast('❌ Failed to send message. Try again.');
    console.error('Send message error:', err);
  }

  btn.disabled = false;
};

// ─────────────────────────────────
// MARK AS READ
// ─────────────────────────────────
async function markAsRead(chatId){
  if(!chatId || !_uid) return;
  try {
    const isWorker  = _role === 'worker';
    const myUnread  = isWorker ? 'workerUnread' : 'clientUnread';
    await updateDoc(doc(db, 'chats', chatId), {
      [myUnread]: 0,
    });

    // Mark messages as read
    const q = query(
      collection(db, 'chats', chatId, 'messages'),
      where('senderId', '!=', _uid),
      where('read', '==', false)
    );
    const snap = await getDocs(q);
    const batch = [];
    snap.forEach(d => {
      batch.push(
        updateDoc(doc(db, 'chats', chatId, 'messages', d.id),
          { read: true })
      );
    });
    await Promise.all(batch);
  } catch(e){
    // Non-critical
  }
}

// ─────────────────────────────────
// UI HELPERS (exported to window)
// ─────────────────────────────────
window.goCall = function(){
  if(!_currentChat) return;
  const jobId    = window._chatJobId || _currentChat.jobId || '';
  const otherUid = _currentChat.otherUid;
  window.location.href =
    `../pages/call.html?job=${jobId}&other=${otherUid}`;
};

window.filterConvs = function(val){
  const filtered = val.trim()
    ? _allConvs.filter(c =>
        (c.workerName||'').toLowerCase().includes(val.toLowerCase()) ||
        (c.clientName||'').toLowerCase().includes(val.toLowerCase()) ||
        (c.lastMessage||'').toLowerCase().includes(val.toLowerCase()) ||
        (c.jobTitle||'').toLowerCase().includes(val.toLowerCase())
      )
    : _allConvs;
  renderConvList(filtered);
};

window.handleScroll = function(){
  const btn = document.getElementById('scrollBtn');
  if(!isScrolledToBottom()){
    if(_newMsgCount > 0) btn.classList.add('show');
  } else {
    btn.classList.remove('show');
    _newMsgCount = 0;
  }
};

window.scrollToBottom = function(){
  const area = document.getElementById('messagesArea');
  area.scrollTop = area.scrollHeight;
};

function isScrolledToBottom(){
  const area = document.getElementById('messagesArea');
  return area.scrollHeight - area.scrollTop - area.clientHeight < 60;
}

window.backToList = function(){
  document.getElementById('chatWindow').classList.remove('active');
  document.getElementById('convSidebar').classList.remove('hidden');
};

window.goBack = function(){
  const role = localStorage.getItem('ds_role');
  if(role === 'worker'){
    window.location.href = '../dashboard/worker.html';
  } else {
    window.location.href = '../dashboard/client.html';
  }
};

// ─────────────────────────────────
// TEXTAREA AUTO-RESIZE
// ─────────────────────────────────
window.onMsgInput = function(el){
  autoResize(el);
  updateCharCount(el.value);
  document.getElementById('sendBtn').disabled = !el.value.trim();
};

function autoResize(el){
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function updateCharCount(val){
  document.getElementById('charCount').textContent =
    val.length + '/1000';
}

window.msgKeydown = function(e){
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    sendMessage();
  }
};

// ─────────────────────────────────
// TOAST
// ─────────────────────────────────
window.showToast = function(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 4000);
};

// ─────────────────────────────────
// TIME FORMATTERS
// ─────────────────────────────────
function formatTime(date){
  const now  = new Date();
  const diff = now - date;
  if(diff < 60000)     return 'now';
  if(diff < 3600000)   return Math.floor(diff/60000)+'m';
  if(diff < 86400000)  return date.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  if(diff < 604800000) return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][date.getDay()];
  return date.toLocaleDateString([],{month:'short',day:'numeric'});
}

function formatDate(date){
  const now  = new Date();
  const diff = now - date;
  if(diff < 86400000) return 'Today';
  if(diff < 172800000) return 'Yesterday';
  return date.toLocaleDateString([],{
    weekday:'long', month:'long', day:'numeric'
  });
}

function formatTimeFull(date){
  return date.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}

// ─────────────────────────────────
// STRING HELPERS
// ─────────────────────────────────
function truncate(str, max){
  return str && str.length > max ? str.slice(0,max)+'...' : (str||'');
}
function escapeAttr(str){
  return (str||'').replace(/'/g,"\\'").replace(/"/g,'&quot;');
}
function escapeHtml(str){
  return (str||'')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/\n/g,'<br/>');
}

console.log('✅ DoorSkill Chat loaded!');
</script>
