<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DoorSkill — Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --rose:#F43F5E; --rose-lt:#FFE4EC; --rose-md:#FB7185;
  --dark:#1A0A14; --mid:#5C3D4E; --muted:#9D7589;
  --border:#F3D6E0; --bg:#FFF5F7;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg); color:var(--dark);
  min-height:100vh; display:flex; flex-direction:column;
}
.top-nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 5%;background:#fff;border-bottom:1px solid var(--border);
}
.logo{
  font-family:'Playfair Display',serif;font-size:20px;
  font-weight:900;color:var(--rose);text-decoration:none;
}
.logo span{color:var(--dark);}

.chat-wrapper {
  flex: 1; max-width: 800px; width: 100%; margin: 20px auto;
  background: #fff; border-radius: 20px; border: 1.5px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
  box-shadow: 0 12px 40px rgba(244,63,94,0.08);
}
.chat-header {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 14px;
}
.ch-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--pink-bg); display: flex; align-items: center; justify-content: center;
  font-size: 20px; overflow: hidden; border: 2px solid var(--rose-lt);
}
.ch-avatar img { width: 100%; height: 100%; object-fit: cover; }
.ch-info h2 { font-size: 16px; font-weight: 700; color: var(--dark); }
.ch-info p { font-size: 12px; color: var(--green); font-weight: 600; }

.chat-box {
  flex: 1; padding: 20px; background: #fafafa; overflow-y: auto; height: 500px;
  display: flex; flex-direction: column; gap: 12px;
}
.msg { max-width: 75%; display: flex; flex-direction: column; }
.msg.me { align-self: flex-end; }
.msg.them { align-self: flex-start; }
.msg-bubble {
  padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.5;
}
.msg.me .msg-bubble { background: var(--rose); color: #fff; border-bottom-right-radius: 4px; }
.msg.them .msg-bubble { background: #fff; color: var(--dark); border: 1.5px solid var(--border); border-bottom-left-radius: 4px; }
.msg-time { font-size: 10px; color: var(--muted); margin-top: 4px; align-self: flex-end; }

.chat-input {
  padding: 16px 20px; background: #fff; border-top: 1px solid var(--border);
  display: flex; gap: 12px; align-items: center;
}
.chat-input input {
  flex: 1; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 999px;
  font-size: 14px; font-family: 'DM Sans', sans-serif; outline: none; transition: all 0.2s;
}
.chat-input input:focus { border-color: var(--rose); }
.send-btn {
  width: 44px; height: 44px; border-radius: 50%; border: none; background: var(--rose); color: #fff;
  font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: transform 0.2s;
}
.send-btn:hover { background: #e0334f; transform: scale(1.05); }

.spin {
  width: 30px; height: 30px; border: 3px solid var(--rose-lt); border-top-color: var(--rose);
  border-radius: 50%; animation: spin .7s linear infinite; margin: auto;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="top-nav">
  <a href="../index.html" class="logo">Door<span>Skill</span></a>
  <a href="../index.html" style="text-decoration:none;font-weight:600;color:var(--mid);font-size:14px;">← Back</a>
</div>

<div class="chat-wrapper">
  <div class="chat-header">
    <div class="ch-avatar" id="headerAvatar">👤</div>
    <div class="ch-info">
      <h2 id="headerName">Loading...</h2>
      <p id="headerStatus">Connecting...</p>
    </div>
  </div>

  <div class="chat-box" id="chatBox">
    <div class="spin"></div>
  </div>

  <form class="chat-input" onsubmit="event.preventDefault(); sendMessage();">
    <input type="text" id="msgInput" placeholder="Type a message..." autocomplete="off"/>
    <button type="submit" class="send-btn">➤</button>
  </form>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, collection, addDoc, query, where, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyDLPAfokHz2ZHdRh8ppAEsdWHCkeloI1g0",
  authDomain: "doorskill-beff1.firebaseapp.com",
  databaseURL: "https://doorskill-beff1-default-rtdb.firebaseio.com",
  projectId: "doorskill-beff1",
  storageBucket: "doorskill-beff1.firebasestorage.app",
});
const auth = getAuth(app);
const db = getFirestore(app);

const urlParams = new URLSearchParams(window.location.search);
const targetUid = urlParams.get('uid');
let myUid = null;
let chatId = null;

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    // Save intended destination
    sessionStorage.setItem('ds_redirect_after_login', window.location.href);
    window.location.href = '../auth/login.html';
    return;
  }
  myUid = user.uid;
  if (!targetUid) {
    document.getElementById('chatBox').innerHTML = '<div style="text-align:center;padding:20px;color:gray;">No user selected.</div>';
    return;
  }
  
  // Sort UIDs alphabetically to create a unique chat ID
  chatId = [myUid, targetUid].sort().join('_');
  
  // Load target user info
  loadTargetInfo();
  
  // Listen for messages
  listenMessages();
});

async function loadTargetInfo() {
  try {
    let snap = await getDoc(doc(db, 'workers', targetUid));
    if (!snap.exists()) {
      snap = await getDoc(doc(db, 'clients', targetUid));
    }
    
    if (snap.exists()) {
      const data = snap.data();
      document.getElementById('headerName').textContent = data.fullName || 'User';
      document.getElementById('headerStatus').textContent = data.isOnline ? '🟢 Online' : 'Active recently';
      if (data.photoURL) {
        document.getElementById('headerAvatar').innerHTML = `<img src="${data.photoURL}"/>`;
      }
    } else {
      document.getElementById('headerName').textContent = 'Unknown User';
      document.getElementById('headerStatus').textContent = 'Offline';
    }
  } catch(e) { console.error(e); }
}

function listenMessages() {
  const box = document.getElementById('chatBox');
  const q = query(collection(db, 'messages'), where('chatId', '==', chatId), orderBy('createdAt', 'asc'));
  
  onSnapshot(q, (snapshot) => {
    if (snapshot.empty && box.innerHTML.includes('spin')) {
      box.innerHTML = '<div style="text-align:center;padding:20px;color:gray;font-size:13px;">Say hi! Start the conversation.</div>';
    } else if (!snapshot.empty) {
      if (box.innerHTML.includes('spin') || box.innerHTML.includes('Say hi')) box.innerHTML = '';
      
      snapshot.docChanges().forEach(change => {
        if (change.type === 'added') {
          const d = change.doc.data();
          const isMe = d.senderId === myUid;
          const time = d.createdAt ? d.createdAt.toDate().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : 'Just now';
          
          const msgDiv = document.createElement('div');
          msgDiv.className = `msg ${isMe ? 'me' : 'them'}`;
          msgDiv.innerHTML = `
            <div class="msg-bubble">${escapeHtml(d.text)}</div>
            <div class="msg-time">${time}</div>
          `;
          box.appendChild(msgDiv);
          box.scrollTop = box.scrollHeight;
        }
      });
    }
  });
}

window.sendMessage = async function() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !chatId || !myUid) return;
  
  input.value = '';
  
  try {
    await addDoc(collection(db, 'messages'), {
      chatId,
      senderId: myUid,
      receiverId: targetUid,
      text,
      createdAt: serverTimestamp()
    });
  } catch(e) {
    console.error('Error sending message:', e);
    alert('Failed to send message.');
  }
};

function escapeHtml(unsafe) {
    return (unsafe||'').replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}
</script>
</body>
</html>
