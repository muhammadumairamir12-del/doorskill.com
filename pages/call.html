<style>
:root{
  --rose:#F43F5E;
  --rose-lt:#FFE4EC;
  --rose-md:#FB7185;
  --dark:#1A0A14;
  --mid:#5C3D4E;
  --muted:#9D7589;
  --border:#F3D6E0;
  --green:#10B981;
  --green-lt:#D1FAE5;
  --blue:#3B82F6;
  --red:#EF4444;
  --white:#fff;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  height:100%;
  font-family:'DM Sans',sans-serif;
  overflow:hidden;
}

/* ── FULL PAGE BACKGROUND ── */
body{
  background:linear-gradient(160deg,
    #12070F 0%,#1e0d1a 40%,#2a0f20 70%,#1A0A14 100%);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:100vh;
  position:relative;
}

/* Animated background blobs */
.bg-blob{
  position:fixed;border-radius:50%;
  filter:blur(80px);pointer-events:none;z-index:0;
  animation:blobFloat 8s ease-in-out infinite;
}
.bb1{
  width:500px;height:500px;
  background:rgba(244,63,94,.12);
  top:-150px;right:-100px;
}
.bb2{
  width:380px;height:380px;
  background:rgba(251,113,133,.08);
  bottom:-80px;left:-100px;
  animation-delay:3s;
}
.bb3{
  width:280px;height:280px;
  background:rgba(59,130,246,.06);
  top:40%;right:15%;
  animation-delay:5s;
}
@keyframes blobFloat{
  0%,100%{transform:translateY(0) scale(1);}
  50%{transform:translateY(-20px) scale(1.04);}
}

/* dot grid pattern */
body::before{
  content:'';position:fixed;inset:0;z-index:0;
  background-image:radial-gradient(
    circle,rgba(255,255,255,.04) 1px,transparent 1px);
  background-size:28px 28px;
  pointer-events:none;
}

/* ── MAIN CARD ── */
.call-card{
  position:relative;z-index:1;
  width:100%;max-width:420px;
  margin:0 16px;
  display:flex;flex-direction:column;
  align-items:center;
  text-align:center;
  padding:48px 32px 36px;
}

/* ── LOGO ── */
.logo{
  display:inline-flex;align-items:center;
  text-decoration:none;
}
.logo img { height: 28px; width: auto; }


/* ── AVATAR RING ── */
.avatar-wrap{
  position:relative;
  margin-bottom:28px;
}
.avatar-ring{
  width:140px;height:140px;
  border-radius:50%;
  position:relative;
  display:flex;align-items:center;justify-content:center;
}
/* Pulsing rings */
.avatar-ring::before,
.avatar-ring::after{
  content:'';
  position:absolute;border-radius:50%;
  border:2px solid rgba(244,63,94,.3);
  animation:ringPulse 2s ease-out infinite;
}
.avatar-ring::before{
  width:100%;height:100%;
  animation-delay:0s;
}
.avatar-ring::after{
  width:120%;height:120%;
  animation-delay:.5s;
}
.pulse-ring-3{
  position:absolute;width:140%;height:140%;
  border-radius:50%;
  border:2px solid rgba(244,63,94,.15);
  animation:ringPulse 2s ease-out infinite .8s;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
}
@keyframes ringPulse{
  0%{opacity:1;transform:scale(.85);}
  100%{opacity:0;transform:scale(1.3);}
}
/* Stop rings when muted or on hold */
.avatar-wrap.muted .avatar-ring::before,
.avatar-wrap.muted .avatar-ring::after,
.avatar-wrap.muted .pulse-ring-3{
  animation-play-state:paused;
  opacity:.3;
}

.avatar-inner{
  width:120px;height:120px;border-radius:50%;
  background:linear-gradient(135deg,var(--rose),#be123c);
  display:flex;align-items:center;justify-content:center;
  font-size:44px;overflow:hidden;
  border:3px solid rgba(255,255,255,.15);
  box-shadow:0 8px 32px rgba(244,63,94,.4);
  position:relative;z-index:1;
}
.avatar-inner img{
  width:100%;height:100%;object-fit:cover;
  display:none;
}

/* ── CALL STATE ── */
.call-state{
  display:flex;align-items:center;gap:7px;
  margin-bottom:10px;
}
.state-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--green);
  animation:pulse 1.5s infinite;
}
@keyframes pulse{
  0%,100%{opacity:1;transform:scale(1);}
  50%{opacity:.5;transform:scale(1.4);}
}
.state-dot.connecting{
  background:#F59E0B;
}
.state-dot.ended{
  background:var(--red);
  animation:none;
}
.state-label{
  font-size:13px;font-weight:600;
  color:rgba(255,255,255,.7);
  letter-spacing:.04em;text-transform:uppercase;
}

/* Name */
.caller-name{
  font-family:'Playfair Display',serif;
  font-size:26px;font-weight:900;
  color:#fff;margin-bottom:4px;
  line-height:1.2;
}
.caller-role{
  font-size:14px;color:rgba(255,255,255,.45);
  margin-bottom:8px;
}
.job-label{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(244,63,94,.15);
  border:1px solid rgba(244,63,94,.25);
  border-radius:999px;padding:5px 14px;
  font-size:12px;font-weight:600;
  color:var(--rose-md);margin-bottom:24px;
}

/* ── TIMER ── */
.call-timer{
  font-family:'Playfair Display',serif;
  font-size:36px;font-weight:900;
  color:#fff;letter-spacing:.05em;
  margin-bottom:6px;
  min-height:44px;
}
.call-timer.connecting{
  font-size:16px;font-weight:500;
  color:rgba(255,255,255,.5);
  font-family:'DM Sans',sans-serif;
  letter-spacing:.02em;
}

/* Network quality */
.net-quality{
  font-size:12px;color:rgba(255,255,255,.35);
  margin-bottom:32px;
  min-height:18px;
  display:flex;align-items:center;
  justify-content:center;gap:6px;
}

/* ── CONTROLS ── */
.controls{
  display:flex;align-items:flex-end;
  justify-content:center;gap:20px;
  margin-bottom:28px;
}
.ctrl-btn{
  display:flex;flex-direction:column;
  align-items:center;gap:8px;
  cursor:pointer;
}
.ctrl-circle{
  width:58px;height:58px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;
  border:1.5px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.08);
  transition:all .2s;
  backdrop-filter:blur(8px);
}
.ctrl-circle:hover{
  background:rgba(255,255,255,.14);
  transform:scale(1.05);
}
.ctrl-circle.active{
  background:var(--rose);
  border-color:var(--rose);
  box-shadow:0 4px 16px rgba(244,63,94,.35);
}
.ctrl-circle.disabled{
  opacity:.4;pointer-events:none;
}
.ctrl-label{
  font-size:11px;color:rgba(255,255,255,.4);
  font-weight:500;
}

/* End call button */
.end-btn{
  width:72px;height:72px;border-radius:50%;
  background:var(--red);
  display:flex;align-items:center;justify-content:center;
  font-size:28px;cursor:pointer;
  border:none;
  box-shadow:0 6px 24px rgba(239,68,68,.45);
  transition:all .2s;
  margin:0 4px;
}
.end-btn:hover{
  background:#dc2626;
  transform:scale(1.05);
  box-shadow:0 8px 28px rgba(239,68,68,.55);
}

/* ── CALL ENDED SCREEN ── */
.ended-screen{
  display:none;
  flex-direction:column;
  align-items:center;
  width:100%;
}
.ended-icon{
  font-size:56px;margin-bottom:16px;
  animation:bounce .5s ease;
}
@keyframes bounce{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.15);}
}
.ended-title{
  font-family:'Playfair Display',serif;
  font-size:24px;font-weight:900;color:#fff;
  margin-bottom:6px;
}
.ended-sub{
  font-size:14px;color:rgba(255,255,255,.45);
  margin-bottom:24px;
  line-height:1.6;
}
.ended-duration{
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  border-radius:12px;padding:14px 28px;
  margin-bottom:24px;
  display:flex;align-items:center;gap:10px;
}
.ed-label{
  font-size:13px;color:rgba(255,255,255,.4);
}
.ed-value{
  font-family:'Playfair Display',serif;
  font-size:20px;font-weight:900;color:#fff;
}
.ended-actions{
  display:flex;flex-direction:column;
  gap:10px;width:100%;
}
.ea-btn{
  width:100%;padding:13px;border-radius:12px;
  font-size:14px;font-weight:700;cursor:pointer;
  font-family:'DM Sans',sans-serif;
  transition:all .2s;
  display:flex;align-items:center;
  justify-content:center;gap:8px;
}
.ea-btn.primary{
  background:var(--rose);color:#fff;border:none;
  box-shadow:0 4px 16px rgba(244,63,94,.3);
}
.ea-btn.primary:hover{background:#e0334f;}
.ea-btn.outline{
  background:transparent;
  border:1.5px solid rgba(255,255,255,.15);
  color:rgba(255,255,255,.7);
}
.ea-btn.outline:hover{
  border-color:rgba(255,255,255,.3);
  color:#fff;
}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(20px);
  background:rgba(255,255,255,.1);
  backdrop-filter:blur(16px);
  color:#fff;padding:11px 20px;border-radius:10px;
  font-size:13px;font-weight:500;
  opacity:0;transition:all .3s;z-index:9999;
  border:1px solid rgba(255,255,255,.15);
  white-space:nowrap;
}
.toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

/* ── PERMISSION MODAL ── */
.perm-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.7);
  backdrop-filter:blur(8px);
  z-index:9999;align-items:center;
  justify-content:center;
}
.perm-overlay.show{display:flex;}
.perm-card{
  background:#1e0d1a;
  border:1.5px solid rgba(244,63,94,.25);
  border-radius:24px;padding:36px 28px;
  max-width:340px;width:100%;margin:16px;
  text-align:center;
}
.perm-icon{font-size:52px;margin-bottom:16px;}
.perm-title{
  font-family:'Playfair Display',serif;
  font-size:22px;font-weight:900;color:#fff;
  margin-bottom:8px;
}
.perm-sub{
  font-size:14px;color:rgba(255,255,255,.5);
  margin-bottom:24px;line-height:1.6;
}
.perm-btn{
  width:100%;padding:13px;border:none;
  border-radius:12px;background:var(--rose);
  color:#fff;font-size:14px;font-weight:700;
  cursor:pointer;font-family:'DM Sans',sans-serif;
  transition:all .2s;margin-bottom:10px;
}
.perm-btn:hover{background:#e0334f;}
.perm-cancel{
  font-size:13px;color:rgba(255,255,255,.35);
  cursor:pointer;
}
.perm-cancel:hover{color:rgba(255,255,255,.6);}

/* ── RESPONSIVE ── */
@media(max-width:480px){
  .call-card{padding:36px 20px 28px;}
  .caller-name{font-size:22px;}
  .call-timer{font-size:30px;}
  .ctrl-circle{width:52px;height:52px;font-size:20px;}
  .end-btn{width:64px;height:64px;font-size:24px;}
}

    <div class="perm-icon">🎤</div>

<!-- ── CALL CARD ── -->
<div class="call-card">

<script type="module">
import { initializeApp }
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  updateDoc,
  onSnapshot,
  serverTimestamp,
  collection,
  addDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// ── Firebase Init ──
const app = initializeApp({
  apiKey:            "AIzaSyDLPAfokHz2ZHdRh8ppAEsdWHCkeloI1g0",
  authDomain:        "doorskill-beff1.firebaseapp.com",
  databaseURL:       "https://doorskill-beff1-default-rtdb.firebaseio.com",
  projectId:         "doorskill-beff1",
  storageBucket:     "doorskill-beff1.firebasestorage.app",
  messagingSenderId: "620272735898",
  appId:             "1:620272735898:web:b35d24737ef79c01a67123"
});

const auth = getAuth(app);
const db   = getFirestore(app);

// ── Agora Config ──
// 🔑 Replace with your Agora App ID from console.agora.io
const AGORA_APP_ID = 'YOUR_AGORA_APP_ID';

// ── URL Params ──
const params    = new URLSearchParams(window.location.search);
const _jobId    = params.get('job')   || '';
const _otherUid = params.get('other') || '';

// ── State ──
let _uid         = null;
let _role        = null;
let _myData      = null;
let _otherData   = null;
let _callId      = null;
let _client      = null;  // Agora client
let _localTrack  = null;  // mic audio track
let _remoteUsers = {};
let _isMuted     = false;
let _isSpeaker   = true;
let _callActive  = false;
let _callStartTime = null;
let _timerInterval = null;
let _callSeconds   = 0;
let _unsubCall     = null;

// ─────────────────────────────────
// AUTH
// ─────────────────────────────────
onAuthStateChanged(auth, async user => {
  if(!user){
    window.location.href = '../auth/login.html';
    return;
  }
  _uid  = user.uid;
  _role = localStorage.getItem('ds_role') || 'client';

  // Load my data
  for(const col of ['workers','clients']){
    const s = await getDoc(doc(db, col, _uid));
    if(s.exists()){ _myData = { id: _uid, ...s.data() }; break; }
  }

  // Load other user data
  if(_otherUid){
    for(const col of ['workers','clients']){
      const s = await getDoc(doc(db, col, _otherUid));
      if(s.exists()){
        _otherData = { id: _otherUid, ...s.data() };
        break;
      }
    }
  }

  // Update UI with other user info
  updateCallUI();

  // Load job info
  if(_jobId){
    try {
      const jSnap = await getDoc(doc(db,'jobs',_jobId));
      if(jSnap.exists()){
        const jData = jSnap.data();
        const jobLabel = document.getElementById('jobLabel');
        const jobText  = document.getElementById('jobLabelText');
        jobText.textContent = jData.title || 'Job Call';
        jobLabel.style.display = 'flex';
      }
    } catch(e){}
  }

  // Check mic permission first
  checkMicPermission();
});

// ─────────────────────────────────
// UPDATE CALL UI
// ─────────────────────────────────
function updateCallUI(){
  if(!_otherData) return;

  const photo = _otherData.photoURL || '';
  const name  = _otherData.fullName || 'User';
  const role  = _otherData.role     || (_role === 'worker' ? 'Client' : 'Worker');

  const img  = document.getElementById('otherPhoto');
  const emo  = document.getElementById('otherEmoji');
  if(photo){
    img.src = photo;
    img.style.display = 'block';
    emo.style.display = 'none';
  } else {
    img.style.display = 'none';
    emo.style.display = 'block';
    emo.textContent   = role === 'worker' ? '👷' : '👤';
  }

  document.getElementById('otherName').textContent =
    name;
  document.getElementById('otherRole').textContent =
    role === 'worker' ? '👷 Service Worker' : '👤 Client';
}

// ─────────────────────────────────
// CHECK MIC PERMISSION
// ─────────────────────────────────
async function checkMicPermission(){
  try {
    const status = await navigator.permissions.query({ name:'microphone' });
    if(status.state === 'granted'){
      initCall();
    } else if(status.state === 'denied'){
      showPermDenied();
    } else {
      // Show permission modal
      document.getElementById('permOverlay').classList.add('show');
    }
  } catch(e){
    // Fallback: just try to init
    document.getElementById('permOverlay').classList.add('show');
  }
}

window.requestMicPermission = async function(){
  document.getElementById('permOverlay').classList.remove('show');
  try {
    await navigator.mediaDevices.getUserMedia({ audio: true });
    initCall();
  } catch(e){
    showPermDenied();
  }
};

function showPermDenied(){
  setCallState('error');
  document.getElementById('callTimer').textContent =
    'Microphone denied';
  document.getElementById('callTimer').className =
    'call-timer connecting';
  showToast('❌ Microphone access denied. Call cannot connect.');
  setTimeout(() => showEndedScreen('no_mic'), 2500);
}

window.cancelCall = function(){
  window.history.back();
};

// ─────────────────────────────────
// INIT AGORA CALL
// ─────────────────────────────────
async function initCall(){
  if(!AGORA_APP_ID || AGORA_APP_ID === 'YOUR_AGORA_APP_ID'){
    // Demo mode — no real Agora App ID set
    showToast('⚠️ Agora App ID not set. Running in demo mode.');
    simulateDemoCall();
    return;
  }

  try {
    setCallState('connecting');

    // Build channel name from job + both UIDs
    const ids     = [_uid, _otherUid].sort();
    const channel = _jobId
      ? `${_jobId}_${ids.join('_')}`
      : ids.join('_');

    _callId = channel;

    // ── Create Agora Client ──
    _client = AgoraRTC.createClient({ mode:'rtc', codec:'vp8' });

    // ── Agora Event Handlers ──

    // Remote user joined
    _client.on('user-published', async (user, mediaType) => {
      await _client.subscribe(user, mediaType);
      if(mediaType === 'audio'){
        user.audioTrack.play();
        _remoteUsers[user.uid] = user;
        setCallState('connected');
        startTimer();
      }
    });

    // Remote user left
    _client.on('user-unpublished', (user) => {
      delete _remoteUsers[user.uid];
      if(Object.keys(_remoteUsers).length === 0 && _callActive){
        // Other person left
        endCall(true);
      }
    });

    // Remote user left channel
    _client.on('user-left', (user) => {
      delete _remoteUsers[user.uid];
      if(_callActive){
        endCall(true);
      }
    });

    // Network quality
    _client.on('network-quality', (stats) => {
      updateNetQuality(stats);
    });

    // ── Join Channel ──
    // Using null token (for testing without token server)
    // For production: generate token server-side
    const agoraUid = Math.floor(Math.random() * 1000000);
    await _client.join(AGORA_APP_ID, channel, null, agoraUid);

    // ── Create & Publish Mic Track ──
    _localTrack = await AgoraRTC.createMicrophoneAudioTrack({
      encoderConfig: 'music_standard',
      ANS: true,  // Automatic Noise Suppression
      AEC: true,  // Acoustic Echo Cancellation
      AGC: true,  // Automatic Gain Control
    });
    await _client.publish(_localTrack);

    // ── Save call record to Firestore ──
    await saveCallRecord(channel, 'initiated');

    // ── Set connecting state ──
    setCallState('connecting');
    document.getElementById('callTimer').textContent =
      'Waiting for other person...';

    // Set connected if no one joins in 30s → timeout
    window._callTimeout = setTimeout(() => {
      if(!_callActive){
        showToast('⚠️ No answer. Ending call.');
        endCall(false, 'no_answer');
      }
    }, 30000);

    _callActive = true;

  } catch(err){
    console.error('Agora init error:', err);
    showToast('❌ Could not connect call: '+err.message);
    setCallState('error');
    setTimeout(() => showEndedScreen('error'), 2000);
  }
}

// ─────────────────────────────────
// DEMO MODE (no Agora App ID)
// ─────────────────────────────────
function simulateDemoCall(){
  setCallState('connecting');
  _callActive = true;

  setTimeout(() => {
    setCallState('connected');
    startTimer();
    showToast('📞 Demo mode — set Agora App ID for real calls');
  }, 2000);
}

// ─────────────────────────────────
// SAVE CALL RECORD TO FIRESTORE
// ─────────────────────────────────
async function saveCallRecord(channel, status){
  try {
    const callData = {
      channel,
      callerId:    _uid,
      callerName:  _myData?.fullName  || '',
      receiverId:  _otherUid          || '',
      receiverName:_otherData?.fullName || '',
      jobId:       _jobId             || null,
      status,
      startedAt:   serverTimestamp(),
      duration:    0,
    };
    const ref = await addDoc(collection(db,'calls'), callData);
    window._callDocId = ref.id;
  } catch(e){
    console.error('Save call record error:', e);
  }
}

// ─────────────────────────────────
// CALL STATE UI
// ─────────────────────────────────
function setCallState(state){
  const dot   = document.getElementById('stateDot');
  const label = document.getElementById('stateLabel');
  const timer = document.getElementById('callTimer');
  const av    = document.getElementById('avatarWrap');

  dot.className   = 'state-dot';
  timer.className = 'call-timer';

  if(state === 'connecting'){
    dot.classList.add('connecting');
    label.textContent = 'Connecting...';
    timer.classList.add('connecting');
    timer.textContent = 'Connecting to call...';
  } else if(state === 'connected'){
    label.textContent = 'On Call';
    timer.textContent = '00:00';
  } else if(state === 'ended'){
    dot.classList.add('ended');
    label.textContent = 'Call Ended';
    av.classList.remove('muted');
  } else if(state === 'error'){
    dot.classList.add('ended');
    label.textContent = 'Failed';
    timer.classList.add('connecting');
  }
}

// ─────────────────────────────────
// TIMER
// ─────────────────────────────────
function startTimer(){
  _callStartTime = Date.now();
  _callSeconds   = 0;

  clearInterval(_timerInterval);
  _timerInterval = setInterval(() => {
    _callSeconds++;
    document.getElementById('callTimer').textContent =
      formatDuration(_callSeconds);
  }, 1000);
}

function stopTimer(){
  clearInterval(_timerInterval);
}

function formatDuration(secs){
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = secs % 60;
  if(h > 0){
    return `${pad(h)}:${pad(m)}:${pad(s)}`;
  }
  return `${pad(m)}:${pad(s)}`;
}

function pad(n){ return String(n).padStart(2,'0'); }

// ─────────────────────────────────
// CONTROLS
// ─────────────────────────────────
window.toggleMute = function(){
  _isMuted = !_isMuted;
  const btn   = document.getElementById('muteBtn');
  const label = document.getElementById('muteLabel');
  const av    = document.getElementById('avatarWrap');

  if(_localTrack){
    _localTrack.setMuted(_isMuted);
  }

  if(_isMuted){
    btn.textContent = '🔇';
    btn.classList.add('active');
    label.textContent = 'Unmute';
    av.classList.add('muted');
    showToast('🔇 Microphone muted');
  } else {
    btn.textContent = '🎤';
    btn.classList.remove('active');
    label.textContent = 'Mute';
    av.classList.remove('muted');
    showToast('🎤 Microphone active');
  }
};

window.toggleSpeaker = function(){
  _isSpeaker = !_isSpeaker;
  const btn = document.getElementById('speakerBtn');

  // On mobile, we can toggle audio output
  // On desktop this toggles remote audio volume
  Object.values(_remoteUsers).forEach(user => {
    if(user.audioTrack){
      user.audioTrack.setVolume(_isSpeaker ? 100 : 0);
    }
  });

  if(_isSpeaker){
    btn.textContent = '🔊';
    btn.classList.remove('active');
    showToast('🔊 Speaker on');
  } else {
    btn.textContent = '🔈';
    btn.classList.add('active');
    showToast('🔈 Speaker off');
  }
};

// ─────────────────────────────────
// END CALL
// ─────────────────────────────────
window.endCall = async function(remoteEnded = false, reason = ''){
  if(!_callActive && !document.getElementById('endedScreen').style.display === 'flex') return;

  clearTimeout(window._callTimeout);
  stopTimer();
  _callActive = false;

  // Leave Agora channel
  try {
    if(_localTrack){
      _localTrack.stop();
      _localTrack.close();
      _localTrack = null;
    }
    if(_client){
      await _client.leave();
    }
  } catch(e){
    console.error('Agora leave error:', e);
  }

  // Update Firestore call record
  try {
    if(window._callDocId){
      await updateDoc(
        doc(db,'calls',window._callDocId),
        {
          status:   'ended',
          duration: _callSeconds,
          endedAt:  serverTimestamp(),
          endedBy:  remoteEnded ? 'remote' : 'local',
        }
      );
    }
  } catch(e){
    console.error('Update call record error:', e);
  }

  // Determine end reason
  let endReason = '';
  if(reason === 'no_answer'){
    endReason = 'No answer';
  } else if(reason === 'no_mic'){
    endReason = 'Microphone unavailable';
  } else if(reason === 'error'){
    endReason = 'Connection failed';
  } else if(remoteEnded){
    endReason = (_otherData?.fullName || 'Other person') + ' ended the call';
  } else {
    endReason = 'You ended the call';
  }

  showEndedScreen(reason || (remoteEnded ? 'remote' : 'local'), endReason);
};

// ─────────────────────────────────
// SHOW ENDED SCREEN
// ─────────────────────────────────
function showEndedScreen(reason, sub = ''){
  setCallState('ended');

  document.getElementById('activeScreen').style.display  = 'none';
  document.getElementById('endedScreen').style.display   = 'flex';

  const icon  = document.getElementById('endedIcon');
  const title = document.getElementById('endedTitle');
  const subEl = document.getElementById('endedSub');

  if(reason === 'no_mic' || reason === 'error'){
    icon.textContent  = '❌';
    title.textContent = 'Call Failed';
    subEl.textContent = sub || 'Could not connect the call.';
  } else {
    icon.textContent  = '📵';
    title.textContent = 'Call Ended';
    subEl.textContent = sub || 'Your call has ended successfully.';
  }

  // Duration
  if(_callSeconds > 0){
    document.getElementById('endedDuration').style.display = 'flex';
    document.getElementById('durationDisplay').textContent =
      formatDuration(_callSeconds);
  }
}

// ─────────────────────────────────
// NETWORK QUALITY INDICATOR
// ─────────────────────────────────
function updateNetQuality(stats){
  const el = document.getElementById('netQuality');
  const levels = {
    0: '',
    1: '📶 Excellent',
    2: '📶 Good',
    3: '📶 Fair',
    4: '⚠️ Poor',
    5: '⚠️ Very Poor',
    6: '❌ Disconnected',
  };
  const q = stats.uplinkNetworkQuality || 0;
  el.textContent = levels[q] || '';
}

// ─────────────────────────────────
// NAVIGATION
// ─────────────────────────────────
window.callAgain = function(){
  // Reload page to restart call
  window.location.reload();
};

window.backToChat = function(){
  const jobId = _jobId || '';
  const other = _otherUid || '';
  if(jobId && other){
    window.location.href =
      `../pages/chat.html?job=${jobId}&other=${other}`;
  } else if(other){
    window.location.href =
      `../pages/chat.html?worker=${other}`;
  } else {
    window.location.href = '../pages/chat.html';
  }
};

window.backToDashboard = function(){
  const role = localStorage.getItem('ds_role');
  if(role === 'worker'){
    window.location.href = '../dashboard/worker.html';
  } else {
    window.location.href = '../dashboard/client.html';
  }
};

// ─────────────────────────────────
// TOAST
// ─────────────────────────────────
window.showToast = function(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3500);
};

// ─────────────────────────────────
// CLEANUP ON PAGE LEAVE
// ─────────────────────────────────
window.addEventListener('beforeunload', async () => {
  if(_callActive){
    try {
      if(_localTrack){ _localTrack.stop(); _localTrack.close(); }
      if(_client) await _client.leave();
    } catch(e){}
  }
  if(_unsubCall) _unsubCall();
});
