<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DoorSkill — Page Not Found</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link rel="icon" href="assets/logo.png" type="image/png"/>
  <style>
    :root {
      --rose: #F43F5E;
      --rose-lt: #FFE4EC;
      --rose-md: #FB7185;
      --dark: #1A0A14;
      --mid: #5C3D4E;
      --muted: #9D7589;
      --border: #F3D6E0;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, var(--dark) 0%, #2d0a1e 50%, #1a0814 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      padding: 20px;
      text-align: center;
    }

    /* Shimmering Cosmic Orbs & Stars */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.15) 1px, transparent 1px);
      background-size: 32px 32px;
      z-index: 0;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }
    .orb-1 {
      width: 400px;
      height: 400px;
      background: rgba(244, 63, 94, 0.2);
      top: -100px;
      left: -100px;
      animation: float 10s ease-in-out infinite;
    }
    .orb-2 {
      width: 300px;
      height: 300px;
      background: rgba(99, 102, 241, 0.15);
      bottom: -60px;
      right: -60px;
      animation: float 8s ease-in-out infinite reverse;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-20px) scale(1.05); }
    }

    .content-wrap {
      position: relative;
      z-index: 1;
      max-width: 600px;
      width: 100%;
      animation: fadeUp 0.8s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Big Shimmering 404 Typography */
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(6rem, 15vw, 10rem);
      font-weight: 900;
      line-height: 1;
      margin-bottom: 10px;
      background: linear-gradient(135deg, var(--rose-md), #fff, var(--rose), #8B5CF6);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 6s ease infinite, pulseGlow 3s ease-in-out infinite alternate;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes pulseGlow {
      from { filter: drop-shadow(0 0 10px rgba(244,63,94,0.1)); }
      to { filter: drop-shadow(0 0 25px rgba(244,63,94,0.3)); }
    }

    h2 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      font-weight: 900;
      margin-bottom: 16px;
    }

    p {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.7);
      line-height: 1.6;
      margin-bottom: 36px;
    }

    /* Cosmic Search Bar */
    .search-outer {
      position: relative;
      max-width: 480px;
      width: 100%;
      margin: 0 auto 36px;
    }
    .search-glow-wrap {
      border-radius: 16px;
      padding: 2px;
      background: linear-gradient(135deg, var(--rose), #8B5CF6, var(--rose-md));
      background-size: 200% 200%;
      animation: gradientShift 3s ease infinite;
      box-shadow: 0 8px 32px rgba(244, 63, 94, 0.2);
    }
    .search-wrap {
      background: rgba(26, 10, 20, 0.95);
      border-radius: 14px;
      padding: 6px 6px 6px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .search-wrap input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-size: 14.5px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
    }
    .search-wrap input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }
    .search-btn {
      background: var(--rose);
      color: #fff;
      border: none;
      cursor: pointer;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 13px;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }
    .search-btn:hover {
      background: #e0334f;
      transform: translateY(-1px);
    }

    /* Navigation Buttons */
    .btns-wrap {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-fill {
      background: var(--rose);
      color: #fff;
    }
    .btn-fill:hover {
      background: #e0334f;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(244, 63, 94, 0.3);
    }
    .btn-outline {
      border: 2px solid rgba(255, 255, 255, 0.3);
      color: #fff;
    }
    .btn-outline:hover {
      border-color: #fff;
      background: rgba(255, 255, 255, 0.08);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="content-wrap">
    <h1>404</h1>
    <h2>Lost in the Gig Space?</h2>
    <p>We couldn't find the page you were looking for. Let's get you back on track by searching for verified professionals in your city.</p>

    <!-- Cosmic Search Bar -->
    <div class="search-outer">
      <div class="search-glow-wrap">
        <div class="search-wrap">
          <input type="text" id="searchInput" placeholder="Find Plumber, Electrician, Tutor..." onkeydown="if(event.key==='Enter') doSearch()" />
          <button class="search-btn" onclick="doSearch()">Search</button>
        </div>
      </div>
    </div>

    <!-- Buttons -->
    <div class="btns-wrap">
      <a href="index.html" class="btn btn-fill">🏠 Return Home</a>
      <a href="pages/find-workers.html" class="btn btn-outline">🔍 Browse All Workers</a>
    </div>
  </div>

  <script>
    function doSearch() {
      const q = document.getElementById('searchInput').value.trim();
      if (!q) {
        document.getElementById('searchInput').focus();
        return;
      }
      window.location.href = 'pages/find-workers.html?q=' + encodeURIComponent(q);
    }
  </script>
</body>
</html>
