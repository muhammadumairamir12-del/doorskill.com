<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DoorSkill — Find Workers Worldwide</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<!-- Leaflet CSS (Global Map) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root{
  --rose:#F43F5E;
  --rose-lt:#FFE4EC;
  --rose-md:#FB7185;
  --pink-bg:#FFF0F5;
  --dark:#1A0A14;
  --mid:#5C3D4E;
  --muted:#9D7589;
  --border:#F3D6E0;
  --green:#10B981;
  --green-lt:#D1FAE5;
  --yellow:#F59E0B;
  --yellow-lt:#FEF3C7;
  --blue:#3B82F6;
  --blue-lt:#DBEAFE;
  --red:#EF4444;
  --red-lt:#FEE2E2;
  --white:#fff;
  --topbar-h:64px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:'DM Sans',sans-serif;color:var(--dark);overflow-x:hidden;}

/* ── NAVBAR ── */
.navbar{
  height:var(--topbar-h);
  background:rgba(255,255,255,.95);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;
  padding:0 5%;gap:14px;
  position:sticky;top:0;z-index:1000;
  box-shadow:0 2px 12px rgba(244,63,94,.08);
}
.logo{
  font-family:'Playfair Display',serif;
  font-size:20px;font-weight:900;
  color:var(--rose);text-decoration:none;
  white-space:nowrap;
}
.logo span{color:var(--dark);}

/* ── MAIN SEARCH BAR (in navbar) ── */
.nav-search{
  flex:1;max-width:560px;
  display:flex;align-items:center;gap:0;
  background:#fff;border:1.5px solid var(--border);
  border-radius:12px;overflow:hidden;
  box-shadow:0 2px 12px rgba(244,63,94,.08);
  transition:border-color .2s;
}
.nav-search:focus-within{border-color:var(--rose);}
.ns-skill{
  flex:1;display:flex;align-items:center;gap:8px;
  padding:0 14px;border-right:1px solid var(--border);
}
.ns-skill input{
  width:100%;border:none;outline:none;
  font-size:14px;font-family:'DM Sans',sans-serif;
  color:var(--dark);background:transparent;
  padding:11px 0;
}
.ns-skill input::placeholder{color:var(--muted);}
.ns-loc{
  display:flex;align-items:center;gap:6px;
  padding:0 10px;min-width:140px;
  position:relative;
}
.ns-loc input{
  width:100%;border:none;outline:none;
  font-size:13px;font-family:'DM Sans',sans-serif;
  color:var(--dark);background:transparent;
  padding:11px 0;
}
.ns-loc input::placeholder{color:var(--muted);}
.ns-loc-icon{font-size:15px;color:var(--muted);flex-shrink:0;}
.ns-btn{
  background:var(--rose);color:#fff;
  border:none;cursor:pointer;
  padding:0 18px;height:100%;
  font-size:14px;font-weight:700;
  font-family:'DM Sans',sans-serif;
  transition:background .2s;
  display:flex;align-items:center;gap:6px;
  white-space:nowrap;
}
.ns-btn:hover{background:#e0334f;}

.nav-right{
  display:flex;align-items:center;gap:8px;
  margin-left:auto;
}
.nav-right a{
  font-size:13px;font-weight:600;
  color:var(--mid);text-decoration:none;
  padding:7px 14px;border-radius:8px;
  transition:all .2s;white-space:nowrap;
}
.nav-right a:hover{background:var(--rose-lt);color:var(--rose);}
.nav-right .fill{
  background:var(--rose);color:#fff!important;
}
.nav-right .fill:hover{background:#e0334f;}

/* ── RESULTS COUNT BAR ── */
.results-bar{
  background:#fff;border-bottom:1px solid var(--border);
  padding:10px 5%;
  display:flex;align-items:center;
  justify-content:space-between;
  flex-wrap:wrap;gap:10px;
  position:sticky;top:var(--topbar-h);
  z-index:99;
}
.results-count{
  font-size:14px;color:var(--muted);font-weight:500;
}
.results-count strong{color:var(--dark);}
.view-toggle{
  display:flex;align-items:center;gap:6px;
}
.vt-btn{
  padding:6px 14px;border-radius:8px;
  border:1.5px solid var(--border);
  background:transparent;
  font-size:13px;font-weight:600;
  color:var(--mid);cursor:pointer;
  font-family:'DM Sans',sans-serif;
  transition:all .2s;
  display:flex;align-items:center;gap:6px;
}
.vt-btn.active{
  background:var(--rose);color:#fff;
  border-color:var(--rose);
}
.vt-btn:hover:not(.active){
  border-color:var(--rose);color:var(--rose);
}

/* ── MAIN LAYOUT ── */
.main-wrap{
  display:flex;height:calc(100vh - var(--topbar-h) - 45px);
}

/* ── FILTER SIDEBAR ── */
.filter-sidebar{
  width:260px;flex-shrink:0;
  background:#fff;border-right:1px solid var(--border);
  overflow-y:auto;padding:16px;
  transition:transform .3s;
}
.fs-title{
  font-size:13px;font-weight:700;color:var(--dark);
  margin-bottom:14px;
  display:flex;align-items:center;justify-content:space-between;
}
.fs-clear{
  font-size:12px;color:var(--rose);cursor:pointer;font-weight:600;
}
.fs-clear:hover{text-decoration:underline;}
.filter-group{margin-bottom:18px;}
.fg-label{
  font-size:11px;font-weight:700;color:var(--mid);
  letter-spacing:.07em;text-transform:uppercase;
  margin-bottom:9px;
}
.fg-options{display:flex;flex-direction:column;gap:6px;}
.fg-option{
  display:flex;align-items:center;gap:8px;
  cursor:pointer;padding:6px 8px;border-radius:8px;
  transition:background .15s;
  font-size:13px;color:var(--mid);
}
.fg-option:hover{background:var(--pink-bg);}
.fg-option input[type=checkbox]{
  accent-color:var(--rose);width:14px;height:14px;
  cursor:pointer;flex-shrink:0;
}
.fg-option.selected{
  background:var(--rose-lt);color:var(--rose);font-weight:600;
}
.range-wrap{padding:0 4px;}
input[type=range]{
  width:100%;accent-color:var(--rose);cursor:pointer;
}
.range-labels{
  display:flex;justify-content:space-between;
  font-size:11px;color:var(--muted);margin-top:4px;
}
.star-filter{
  display:flex;gap:6px;flex-wrap:wrap;
}
.star-opt{
  padding:5px 12px;border-radius:999px;
  border:1.5px solid var(--border);
  font-size:12px;cursor:pointer;
  transition:all .2s;color:var(--mid);
  font-family:'DM Sans',sans-serif;
}
.star-opt:hover,.star-opt.active{
  border-color:var(--rose);
  background:var(--rose-lt);color:var(--rose);font-weight:600;
}
.fg-select{
  width:100%;padding:8px 12px;
  border:1.5px solid var(--border);border-radius:8px;
  font-size:13px;color:var(--mid);
  font-family:'DM Sans',sans-serif;
  outline:none;background:#fff;cursor:pointer;
}
.fg-select:focus{border-color:var(--rose);}
.apply-btn{
  width:100%;padding:11px;border:none;
  border-radius:10px;background:var(--rose);
  color:#fff;font-size:14px;font-weight:700;
  cursor:pointer;font-family:'DM Sans',sans-serif;
  transition:all .2s;margin-top:6px;
}
.apply-btn:hover{background:#e0334f;}

/* ── CONTENT AREA ── */
.content-area{
  flex:1;overflow:hidden;
  display:flex;flex-direction:column;
}

/* ── GRID VIEW ── */
.grid-view{
  flex:1;overflow-y:auto;
  padding:18px;
  background:#FFF5F7;
}
.workers-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:16px;
}

/* Worker Card */
.worker-card{
  background:#fff;border-radius:16px;
  border:1.5px solid var(--border);
  overflow:hidden;transition:all .25s;
  cursor:pointer;
}
.worker-card:hover{
  border-color:var(--rose-md);
  box-shadow:0 10px 32px rgba(244,63,94,.13);
  transform:translateY(-3px);
}
.wc-cover{
  height:80px;
  background:linear-gradient(135deg,var(--rose-lt),#ffd6e4);
  position:relative;
  display:flex;align-items:flex-end;
  padding:0 16px 0;
}
.wc-cover-pat{
  position:absolute;inset:0;
  background-image:radial-gradient(
    circle,rgba(244,63,94,.12) 1px,transparent 1px);
  background-size:18px 18px;
}
.wc-avatar{
  width:60px;height:60px;border-radius:14px;
  border:3px solid #fff;
  background:linear-gradient(135deg,var(--rose),#be123c);
  display:flex;align-items:center;justify-content:center;
  font-size:24px;overflow:hidden;
  position:relative;margin-bottom:-20px;z-index:1;
  flex-shrink:0;
}
.wc-avatar img{
  width:100%;height:100%;object-fit:cover;display:none;
}
.wc-online-dot{
  position:absolute;bottom:2px;right:2px;
  width:12px;height:12px;border-radius:50%;
  background:var(--green);border:2px solid #fff;
}
.wc-body{padding:28px 16px 16px;}
.wc-name{
  font-family:'Playfair Display',serif;
  font-size:16px;font-weight:900;color:var(--dark);
  margin-bottom:2px;
}
.wc-cat{font-size:12px;color:var(--muted);}
.wc-meta{
  display:flex;align-items:center;
  gap:12px;margin:10px 0;flex-wrap:wrap;
}
.wc-rating{
  display:flex;align-items:center;gap:3px;
  font-size:12px;font-weight:600;color:var(--dark);
}
.wc-rating .star{color:#F59E0B;}
.wc-location{
  font-size:12px;color:var(--muted);
  display:flex;align-items:center;gap:3px;
}
.wc-skills{
  display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;
}
.wc-skill{
  padding:3px 10px;border-radius:999px;
  background:var(--rose-lt);color:var(--rose);
  font-size:11px;font-weight:600;
}
.wc-foot{
  display:flex;align-items:center;
  justify-content:space-between;
  padding-top:12px;
  border-top:1px solid var(--border);
}
.wc-rate{
  font-family:'Playfair Display',serif;
  font-size:15px;font-weight:900;color:var(--rose);
}
.wc-rate span{font-size:11px;font-weight:400;color:var(--muted);}
.wc-btns{display:flex;gap:6px;}
.wc-btn-msg{
  padding:6px 12px;border:1.5px solid var(--border);
  border-radius:8px;background:transparent;
  color:var(--mid);font-size:12px;font-weight:600;
  cursor:pointer;font-family:'DM Sans',sans-serif;
  transition:all .2s;
}
.wc-btn-msg:hover{border-color:var(--rose);color:var(--rose);}
.wc-btn-hire{
  padding:6px 14px;border:none;
  border-radius:8px;background:var(--rose);
  color:#fff;font-size:12px;font-weight:700;
  cursor:pointer;font-family:'DM Sans',sans-serif;
  transition:all .2s;
}
.wc-btn-hire:hover{background:#e0334f;}
.wc-verified{
  display:flex;align-items:center;gap:4px;
  font-size:11px;color:var(--green);
  font-weight:600;
}
.wc-jobs-done{
  font-size:11px;color:var(--muted);
}

/* ── MAP VIEW ── */
.map-view{
  flex:1;position:relative;display:none;
}
.map-view.active{display:flex;}
#workerMap{
  width:100%;height:100%;
  z-index:1;
}
.map-panel{
  position:absolute;top:12px;right:12px;
  width:300px;max-height:calc(100% - 24px);
  background:#fff;border-radius:16px;
  border:1.5px solid var(--border);
  box-shadow:0 8px 32px rgba(0,0,0,.12);
  overflow-y:auto;z-index:500;
  display:flex;flex-direction:column;
}
.map-panel-head{
  padding:14px 16px 10px;
  border-bottom:1px solid var(--border);
  font-size:14px;font-weight:700;color:var(--dark);
  position:sticky;top:0;background:#fff;z-index:1;
}
.map-worker-item{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;border-bottom:1px solid var(--pink-bg);
  cursor:pointer;transition:background .15s;
}
.map-worker-item:hover{background:var(--pink-bg);}
.map-worker-item:last-child{border-bottom:none;}
.mwi-avatar{
  width:42px;height:42px;border-radius:10px;
  background:var(--rose-lt);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;overflow:hidden;
  border:2px solid var(--border);
}
.mwi-avatar img{width:100%;height:100%;object-fit:cover;display:none;}
.mwi-name{font-size:13px;font-weight:700;color:var(--dark);}
.mwi-cat{font-size:11px;color:var(--muted);}
.mwi-rating{font-size:11px;color:#F59E0B;font-weight:600;}
.mwi-loc{font-size:11px;color:var(--muted);}

/* Custom Leaflet Popup */
.lf-popup{
  font-family:'DM Sans',sans-serif;
  min-width:180px;
}
.lf-popup-name{
  font-weight:700;font-size:14px;color:var(--dark);
  margin-bottom:3px;
}
.lf-popup-cat{font-size:12px;color:var(--muted);margin-bottom:6px;}
.lf-popup-row{
  display:flex;align-items:center;
  justify-content:space-between;gap:8px;
}
.lf-popup-rate{
  font-weight:900;color:var(--rose);font-size:14px;
}
.lf-popup-btn{
  padding:5px 12px;background:var(--rose);color:#fff;
  border:none;border-radius:6px;
  font-size:12px;font-weight:700;cursor:pointer;
  font-family:'DM Sans',sans-serif;
}

/* ── SPLIT VIEW (map + grid) ── */
.split-view{
  flex:1;display:none;
}
.split-view.active{display:flex;}
.split-grid{
  width:50%;overflow-y:auto;
  padding:14px;background:#FFF5F7;
  border-right:1px solid var(--border);
}
.split-map{flex:1;}
#workerMapSplit{width:100%;height:100%;}

/* ── WORKER PROFILE MODAL ── */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(26,10,20,.55);
  backdrop-filter:blur(6px);
  z-index:9999;align-items:center;justify-content:center;
}
.modal-overlay.show{display:flex;}
.worker-modal{
  background:#fff;border-radius:24px;
  width:100%;max-width:520px;margin:16px;
  box-shadow:0 24px 80px rgba(0,0,0,.2);
  overflow:hidden;max-height:90vh;overflow-y:auto;
}
.wm-cover{
  height:100px;
  background:linear-gradient(135deg,var(--rose),#be123c);
  position:relative;
}
.wm-cover-pat{
  position:absolute;inset:0;
  background-image:radial-gradient(
    circle,rgba(255,255,255,.1) 1px,transparent 1px);
  background-size:20px 20px;
}
.wm-close{
  position:absolute;top:12px;right:14px;
  background:rgba(255,255,255,.2);border:none;
  border-radius:8px;color:#fff;font-size:18px;
  cursor:pointer;width:32px;height:32px;
  display:flex;align-items:center;justify-content:center;
}
.wm-body{padding:0 24px 24px;}
.wm-avatar{
  width:80px;height:80px;border-radius:18px;
  border:4px solid #fff;
  background:var(--rose-lt);
  display:flex;align-items:center;justify-content:center;
  font-size:32px;overflow:hidden;
  margin-top:-40px;margin-bottom:12px;
  position:relative;
}
.wm-avatar img{
  width:100%;height:100%;object-fit:cover;display:none;
}
.wm-online{
  position:absolute;bottom:4px;right:4px;
  width:14px;height:14px;border-radius:50%;
  background:var(--green);border:2px solid #fff;
}
.wm-name{
  font-family:'Playfair Display',serif;
  font-size:22px;font-weight:900;color:var(--dark);
}
.wm-cat{font-size:14px;color:var(--muted);margin-bottom:8px;}
.wm-stats{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:10px;margin:14px 0;
}
.wm-stat{
  text-align:center;padding:12px 8px;
  background:var(--pink-bg);border-radius:12px;
}
.wm-stat-num{
  font-family:'Playfair Display',serif;
  font-size:20px;font-weight:900;color:var(--rose);
}
.wm-stat-lbl{font-size:11px;color:var(--muted);margin-top:2px;}
.wm-section{margin:16px 0;}
.wm-section-title{
  font-size:12px;font-weight:700;color:var(--mid);
  letter-spacing:.07em;text-transform:uppercase;
  margin-bottom:8px;
}
.wm-skills{display:flex;flex-wrap:wrap;gap:6px;}
.wm-skill{
  padding:5px 12px;border-radius:999px;
  background:var(--rose-lt);color:var(--rose);
  font-size:12px;font-weight:600;
}
.wm-bio{
  font-size:14px;color:var(--mid);line-height:1.7;
  background:var(--pink-bg);border-radius:12px;
  padding:12px 14px;
}
.wm-info-list{
  display:flex;flex-direction:column;gap:8px;
}
.wm-info-row{
  display:flex;align-items:center;gap:10px;
  font-size:13px;color:var(--mid);
}
.wm-info-icon{font-size:15px;width:20px;text-align:center;}
.wm-info-val{color:var(--dark);font-weight:500;}
.wm-actions{
  display:flex;gap:10px;margin-top:20px;
}
.wm-btn-msg{
  flex:1;padding:13px;border:1.5px solid var(--border);
  border-radius:12px;background:transparent;
  color:var(--mid);font-size:14px;font-weight:700;
  cursor:pointer;font-family:'DM Sans',sans-serif;
  transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.wm-btn-msg:hover{border-color:var(--rose);color:var(--rose);}
.wm-btn-hire{
  flex:2;padding:13px;border:none;
  border-radius:12px;background:var(--rose);
  color:#fff;font-size:14px;font-weight:700;
  cursor:pointer;font-family:'DM Sans',sans-serif;
  transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.wm-btn-hire:hover{
  background:#e0334f;transform:translateY(-1px);
  box-shadow:0 6px 20px rgba(244,63,94,.3);
}
.wm-verified-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--green-lt);color:#065F46;
  font-size:12px;font-weight:600;padding:4px 12px;
  border-radius:999px;margin-bottom:10px;
}

/* ── EMPTY / LOADING ── */
.empty-state{
  text-align:center;padding:60px 20px;
  color:var(--muted);
  grid-column:1/-1;
}
.empty-icon{font-size:56px;margin-bottom:14px;}
.empty-title{
  font-size:18px;font-weight:700;color:var(--dark);
  margin-bottom:8px;
}
.empty-sub{font-size:14px;line-height:1.6;max-width:340px;margin:0 auto;}
.loading-grid{
  display:flex;justify-content:center;
  align-items:center;padding:60px;
  grid-column:1/-1;
}
.spinner{
  width:44px;height:44px;
  border:4px solid var(--rose-lt);
  border-top-color:var(--rose);
  border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* Skeleton card */
.skeleton-card{
  background:#fff;border-radius:16px;
  border:1.5px solid var(--border);
  overflow:hidden;
}
.skel{
  background:linear-gradient(90deg,#f3f3f3 25%,#e8e8e8 50%,#f3f3f3 75%);
  background-size:200% 100%;
  animation:shimmer 1.5s infinite;
  border-radius:6px;
}
@keyframes shimmer{
  0%{background-position:200% 0;}
  100%{background-position:-200% 0;}
}
.sk-cover{height:80px;border-radius:0;}
.sk-body{padding:28px 16px 16px;}
.sk-line{height:12px;margin-bottom:10px;}
.sk-line.sm{width:60%;}
.sk-line.xs{width:40%;}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:24px;right:24px;z-index:99999;
  background:var(--dark);color:#fff;
  padding:12px 18px;border-radius:10px;
  font-size:14px;font-weight:500;
  box-shadow:0 8px 24px rgba(0,0,0,.25);
  border-left:3px solid var(--rose);
  transform:translateY(20px);opacity:0;
  transition:all .3s;max-width:320px;
}
.toast.show{transform:translateY(0);opacity:1;}

/* ── LOCATION SUGGESTIONS ── */
.loc-suggest{
  position:absolute;top:calc(100% + 4px);
  left:0;right:0;background:#fff;
  border:1.5px solid var(--border);
  border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.1);
  z-index:9999;overflow:hidden;display:none;
  max-height:200px;overflow-y:auto;
}
.loc-suggest.show{display:block;}
.ls-item{
  padding:10px 14px;cursor:pointer;
  font-size:13px;color:var(--dark);
  display:flex;align-items:center;gap:8px;
  transition:background .15s;
  border-bottom:1px solid var(--pink-bg);
}
.ls-item:last-child{border-bottom:none;}
.ls-item:hover{background:var(--pink-bg);}

/* ── MOBILE FILTER TOGGLE ── */
.mob-filter-btn{
  display:none;
  padding:7px 14px;border:1.5px solid var(--border);
  border-radius:8px;background:#fff;

<script type="module">
import { initializeApp }
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  query,
  where,
  orderBy,
  limit
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:            "AIzaSyDLPAfokHz2ZHdRh8ppAEsdWHCkeloI1g0",
  authDomain:        "doorskill-beff1.firebaseapp.com",
  databaseURL:       "https://doorskill-beff1-default-rtdb.firebaseio.com",
  projectId:         "doorskill-beff1",
  storageBucket:     "doorskill-beff1.firebasestorage.app",
  messagingSenderId: "620272735898",
  appId:             "1:620272735898:web:b35d24737ef79c01a67123"
});

const db = getFirestore(app);

// ── LOAD WORKERS FROM FIREBASE ──
window._loadWorkers = async function(skillQuery, locationQuery){
  try {
    // Base query: only active workers
    let q = query(
      collection(db, 'workers'),
      where('status', '==', 'active'),
      limit(200)
    );

    const snap = await getDocs(q);
    let workers = [];
    snap.forEach(d => workers.push({ id: d.id, ...d.data() }));

    // Client-side skill filter
    if(skillQuery && skillQuery.trim()){
      const sq = skillQuery.toLowerCase().trim();
      workers = workers.filter(w =>
        (w.fullName    || '').toLowerCase().includes(sq) ||
        (w.category    || '').toLowerCase().includes(sq) ||
        (w.skills      || []).some(s => s.toLowerCase().includes(sq)) ||
        (w.bio         || '').toLowerCase().includes(sq)
      );
    }

    // Client-side location filter
    if(locationQuery && locationQuery.trim()){
      const lq = locationQuery.toLowerCase().trim();
      workers = workers.filter(w =>
        (w.city     || '').toLowerCase().includes(lq) ||
        (w.country  || '').toLowerCase().includes(lq) ||
        (w.province || '').toLowerCase().includes(lq) ||
        (w.address  || '').toLowerCase().includes(lq)
      );
    }

    return workers;
  } catch(err){
    console.error('Firebase load workers error:', err);
    return [];
  }
};

window._loadWorkersExposed = true;
console.log('✅ Firebase loaded for find-workers');
</script>

<!-- ══════════════════════════════════
     MAIN UI SCRIPT
══════════════════════════════════ -->
<script>
// ── State ──
let _allWorkers   = [];
let _filtered     = [];
let _minRating    = 0;
let _maxRate      = 10000;
let _currentWorker= null;
let _map          = null;
let _mapSplit     = null;
let _mapMarkers   = [];
let _mapSplitMarkers = [];
let _view         = 'grid';
let _mapsInitialized = { main: false, split: false };

// ── URL Params ──
const _params   = new URLSearchParams(window.location.search);
const _initQ    = _params.get('q')        || '';
const _initCat  = _params.get('category') || '';
const _initLoc  = _params.get('location') || '';

// ── On Load ──
window.addEventListener('load', () => {
  if(_initQ)   document.getElementById('skillInput').value    = _initQ;
  if(_initLoc) document.getElementById('locationInput').value = _initLoc;
  if(_initCat){
    // Pre-check the matching category checkbox
    const cbs = document.querySelectorAll('#catOptions input');
    cbs.forEach(cb => {
      if(_initCat.toLowerCase().includes(cb.value.toLowerCase())){
        cb.checked = true;
      }
    });
  }
  initPage();
});

// ── Init ──
async function initPage(){
  // Wait for Firebase module
  let attempts = 0;
  while(!window._loadWorkersExposed && attempts < 30){
    await new Promise(r => setTimeout(r, 100));
    attempts++;
  }

  const skill = document.getElementById('skillInput').value;
  const loc   = document.getElementById('locationInput').value;

  _allWorkers = await window._loadWorkers(skill, loc);
  _filtered   = [..._allWorkers];

  applyFilters();
}

// ── SEARCH ──
window.doSearch = async function(){
  const skill = document.getElementById('skillInput').value.trim();
  const loc   = document.getElementById('locationInput').value.trim();

  // Update URL
  const params = new URLSearchParams();
  if(skill) params.set('q', skill);
  if(loc)   params.set('location', loc);
  history.replaceState(null,'','?'+params.toString());

  // Show loading
  showLoadingSkeleton();

  _allWorkers = await window._loadWorkers(skill, loc);
  _filtered   = [..._allWorkers];
  applyFilters();
};

window.searchEnter = function(e){
  if(e.key === 'Enter') doSearch();
};

// ── SKILL AUTOCOMPLETE ──
const SKILLS = [
  'Plumber','Electrician','Carpenter','Painter','AC Repair','Welder',
  'Math Teacher','Science Teacher','English Tutor','Quran Tutor','Coding Tutor',
  'Doctor','Dentist','Physiotherapist','Nutritionist','Nurse','Psychologist',
  'Makeup Artist','Salon','Barber','Manicure','Hair Stylist',
  'Home Cleaning','Sofa Cleaning','Carpet Cleaning','Kitchen Cleaning',
  'Laptop Repair','Mobile Repair','Internet Setup','Software Install',
  'Car Mechanic','Bike Mechanic','Car Wash',
  'Chef','Driver','Freelancer','Security Guard','Accountant',
  'Lawyer','Mason','Graphic Designer','Photographer','Videographer',
  'Architect','Engineer','Data Analyst','Web Developer','App Developer',
  'Social Media Manager','Content Writer','Translator','Fitness Trainer',
];

window.onSkillInput = function(val){
  // No autocomplete popup needed — search is in navbar
  // Just handle enter key (already done)
};

// ── LOCATION SUGGESTIONS (Nominatim — OpenStreetMap — Worldwide) ──
let _locTimeout = null;
window.onLocInput = function(val){
  clearTimeout(_locTimeout);
  const sug = document.getElementById('locSuggest');
  if(!val || val.length < 2){
    sug.classList.remove('show');
    return;
  }
  _locTimeout = setTimeout(() => fetchLocSuggestions(val), 400);
};

async function fetchLocSuggestions(query){
  const sug = document.getElementById('locSuggest');
  try {
    const url = `https://nominatim.openstreetmap.org/search?` +
      `format=json&q=${encodeURIComponent(query)}&limit=6&addressdetails=1`;
    const res  = await fetch(url, {
      headers: { 'Accept-Language': 'en' }
    });
    const data = await res.json();

    if(!data.length){
      sug.classList.remove('show');
      return;
    }

    sug.innerHTML = data.map(place => `
      <div class="ls-item"
           onclick="selectLocation('${
             escapeAttr(place.display_name)
           }', ${place.lat}, ${place.lon})">
        📍 <span>${truncate(place.display_name, 50)}</span>
      </div>
    `).join('');
    sug.classList.add('show');

  } catch(e){
    sug.classList.remove('show');
  }
}

window.selectLocation = function(name, lat, lon){
  document.getElementById('locationInput').value = truncate(name, 40);
  document.getElementById('locSuggest').classList.remove('show');
  // Store coords for map centering
  window._selectedLat = parseFloat(lat);
  window._selectedLon = parseFloat(lon);
  doSearch();
};

document.addEventListener('click', e => {
  if(!e.target.closest('#locWrap')){
    document.getElementById('locSuggest').classList.remove('show');
  }
});

// ── APPLY FILTERS ──
window.applyFilters = function(){
  let workers = [..._allWorkers];

  // Category filter
  const checkedCats = [
    ...document.querySelectorAll('#catOptions input:checked')
  ].map(cb => cb.value.toLowerCase());

  if(checkedCats.length > 0){
    workers = workers.filter(w =>
      checkedCats.some(cat =>
        (w.category || '').toLowerCase().includes(cat)
      )
    );
  }

  // Rating filter
  if(_minRating > 0){
    workers = workers.filter(w => (w.rating || 0) >= _minRating);
  }

  // Max rate filter
  workers = workers.filter(w => (w.rate || 0) <= _maxRate || !w.rate);

  // Online filter
  if(document.getElementById('filterOnline').checked){
    workers = workers.filter(w => w.isOnline === true);
  }

  // Verified filter
  if(document.getElementById('filterVerified').checked){
    workers = workers.filter(w => w.status === 'active');
  }

  // Experience filter
  const expVal = document.getElementById('filterExp').value;
  if(expVal){
    workers = workers.filter(w => (w.experience || '') === expVal);
  }

  // Sort
  const sortVal = document.getElementById('sortBy').value;
  if(sortVal === 'rating'){
    workers.sort((a,b) => (b.rating||0)-(a.rating||0));
  } else if(sortVal === 'jobs'){
    workers.sort((a,b) => (b.totalJobs||0)-(a.totalJobs||0));
  } else if(sortVal === 'rate-low'){
    workers.sort((a,b) => (a.rate||0)-(b.rate||0));
  } else if(sortVal === 'rate-high'){
    workers.sort((a,b) => (b.rate||0)-(a.rate||0));
  } else if(sortVal === 'newest'){
    workers.sort((a,b) => {
      const ta = b.createdAt?.seconds || 0;
      const tb = a.createdAt?.seconds || 0;
      return ta - tb;
    });
  }

  _filtered = workers;
  renderView();
};

// ── RATING SETTER ──
window.setRating = function(val, el){
  _minRating = val;
  document.querySelectorAll('.star-opt')
          .forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
};

// ── RATE SLIDER ──
window.updateRateLabel = function(val){
  _maxRate = parseInt(val);
  document.getElementById('rateLabel').textContent =
    val >= 10000 ? 'Any Rate' : 'Up to Rs. '+parseInt(val).toLocaleString();
  applyFilters();
};

// ── CLEAR FILTERS ──
window.clearFilters = function(){
  document.querySelectorAll('#catOptions input')
          .forEach(cb => cb.checked = false);
  document.getElementById('filterOnline').checked   = false;
  document.getElementById('filterVerified').checked = false;
  document.getElementById('filterExp').value        = '';
  document.getElementById('sortBy').value           = 'rating';
  document.getElementById('maxRateSlider').value    = 10000;
  document.getElementById('rateLabel').textContent  = 'Up to Rs. 10,000';
  document.querySelectorAll('.star-opt')
          .forEach(b => b.classList.remove('active'));
  _minRating = 0;
  _maxRate   = 10000;
  applyFilters();
};

// ── RENDER VIEW ──
function renderView(){
  updateResultsCount();
  if(_view === 'grid')  renderGrid();
  if(_view === 'map')   renderMapView();
  if(_view === 'split') renderSplitView();
}

// ── UPDATE COUNT ──
function updateResultsCount(){
  const skill = document.getElementById('skillInput').value.trim();
  const loc   = document.getElementById('locationInput').value.trim();
  const n     = _filtered.length;

  let txt = `<strong>${n}</strong> worker${n!==1?'s':''} found`;
  if(skill) txt += ` for "<strong>${skill}</strong>"`;
  if(loc)   txt += ` near "<strong>${loc}</strong>"`;
  if(!skill && !loc) txt = `<strong>${n}</strong> worker${n!==1?'s':''} available worldwide`;
  document.getElementById('resultsCount').innerHTML = txt;
}

// ── RENDER GRID ──
function renderGrid(container = document.getElementById('workersGrid')){
  if(!_filtered.length){
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🔍</div>
        <div class="empty-title">No workers found</div>
        <div class="empty-sub">
          Try a different skill, location, or adjust your filters.
          Any worker worldwide can register on DoorSkill!
        </div>
      </div>`;
    return;
  }
  container.innerHTML = _filtered.map(w => workerCardHTML(w)).join('');
}

// ── WORKER CARD HTML ──
function workerCardHTML(w){
  const skills = (w.skills || []).slice(0,3);
  const rating = w.rating ? Number(w.rating).toFixed(1) : '—';
  const rate   = w.rate ? 'Rs.'+Number(w.rate).toLocaleString() : 'Negotiable';
  const rateType = w.rateType ? '/'+w.rateType.replace('Per ','').toLowerCase() : '';
  const city   = [w.city, w.country].filter(Boolean).join(', ') || 'Worldwide';
  const jobs   = w.totalJobs || 0;

  const avatarContent = w.photoURL
    ? `<img src="${w.photoURL}" alt="" style="display:block;"
            onerror="this.style.display='none'"
            onload="this.style.display='block'"/>👷`
    : '👷';

  return `
  <div class="worker-card" onclick="openWorkerModal('${w.id}')">
    <div class="wc-cover">
      <div class="wc-cover-pat"></div>
      <div class="wc-avatar">
        ${w.photoURL
          ? `<img src="${w.photoURL}" alt=""
                  onerror="this.style.display='none'"
                  onload="this.style.display='block'"/>`
          : '👷'
        }
        ${w.isOnline
          ? `<div class="wc-online-dot"></div>`
          : ''}
      </div>
    </div>
    <div class="wc-body">
      <div class="wc-name">${w.fullName || 'Worker'}</div>
      <div class="wc-cat">${w.category || 'Skilled Worker'}</div>
      <div class="wc-meta">
        <div class="wc-rating">
          <span class="star">★</span>
          ${rating}
          <span style="color:var(--muted);font-weight:400;">
            (${w.totalReviews||0})
          </span>
        </div>
        <div class="wc-location">📍 ${city}</div>
        ${w.status==='active'
          ? `<span style="font-size:11px;color:var(--green);font-weight:600;">
               ✅ Verified
             </span>`
          : ''
        }
      </div>
      <div class="wc-skills">
        ${skills.map(s=>`<span class="wc-skill">${s}</span>`).join('')}
        ${!skills.length
          ? `<span class="wc-skill">${w.category||'General'}</span>`
          : ''}
      </div>
      <div class="wc-foot">
        <div class="wc-rate">
          ${rate}
          <span>${rateType}</span>
        </div>
        <div class="wc-btns">
          <button class="wc-btn-msg"
                  onclick="event.stopPropagation();
                           goToChat('${w.id}')">
            💬
          </button>
          <button class="wc-btn-hire"
                  onclick="event.stopPropagation();
                           goPostJobFor('${w.id}','${escapeAttr(w.fullName||'')}')">
            Hire
          </button>
        </div>
      </div>
      <div class="wc-jobs-done" style="margin-top:8px;font-size:11px;">
        ${jobs} job${jobs!==1?'s':''} completed
      </div>
    </div>
  </div>`;
}

// ── OPEN WORKER MODAL ──
window.openWorkerModal = function(wid){
  const w = _filtered.find(x => x.id === wid)
         || _allWorkers.find(x => x.id === wid);
  if(!w) return;
  _currentWorker = w;

  const rating  = w.rating  ? Number(w.rating).toFixed(1)+'⭐' : 'No reviews';
  const rate    = w.rate    ? 'Rs.'+Number(w.rate).toLocaleString() : 'Negotiable';
  const city    = [w.city, w.country].filter(Boolean).join(', ') || 'Worldwide';

  // Avatar
  const img  = document.getElementById('wmAvatarImg');
  const emo  = document.getElementById('wmAvatarEmoji');
  if(w.photoURL){
    img.src = w.photoURL;
    img.style.display = 'block';
    emo.style.display = 'none';
  } else {
    img.style.display = 'none';
    emo.style.display = 'block';
    emo.textContent   = '👷';
  }

  // Online dot
  document.getElementById('wmOnlineDot').style.display =
    w.isOnline ? 'block' : 'none';

  // Verified badge
  document.getElementById('wmVerified').style.display =
    w.status === 'active' ? 'flex' : 'none';

  // Info
  document.getElementById('wmName').textContent = w.fullName || 'Worker';
  document.getElementById('wmCat').textContent  = w.category || 'Skilled Worker';
  document.getElementById('wmRating').textContent = rating;
  document.getElementById('wmJobs').textContent   = w.totalJobs || 0;
  document.getElementById('wmRate').textContent   = rate;
  document.getElementById('wmBio').textContent =
    w.bio || 'This worker hasn\'t added a bio yet.';
  document.getElementById('wmLocation').textContent =
    city + (w.province ? ', '+w.province : '');
  document.getElementById('wmExp').textContent =
    w.experience || 'Not specified';
  document.getElementById('wmRateType').textContent =
    (w.rate ? 'Rs.'+Number(w.rate).toLocaleString() : 'Negotiable') +
    (w.rateType ? ' — '+w.rateType : '');
  document.getElementById('wmStatus').textContent =
    w.status === 'active' ? '✅ Verified & Active'
    : w.status === 'pending' ? '⏳ Pending Verification'
    : w.status || 'Unknown';

  // Skills
  const skills = w.skills || [];
  document.getElementById('wmSkills').innerHTML =
    skills.map(s=>`<span class="wm-skill">${s}</span>`).join('') ||
    `<span class="wm-skill">${w.category||'General'}</span>`;

  document.getElementById('workerModal').classList.add('show');
};

window.closeModal = function(){
  document.getElementById('workerModal').classList.remove('show');
  _currentWorker = null;
};

// Close modal on backdrop click
document.getElementById('workerModal').addEventListener('click', e => {
  if(e.target === document.getElementById('workerModal')) closeModal();
});

// ── MAP VIEW ──
window.setView = function(v){
  _view = v;
  ['grid','map','split'].forEach(name => {
    document.getElementById('vt-'+name).classList.remove('active');
  });
  document.getElementById('vt-'+v).classList.add('active');

  document.getElementById('gridView').style.display  = 'none';
  document.getElementById('mapView').style.display   = 'none';
  document.getElementById('splitView').style.display = 'none';

  if(v === 'grid'){
    document.getElementById('gridView').style.display  = 'block';
    renderGrid();
  } else if(v === 'map'){
    document.getElementById('mapView').style.display   = 'flex';
    initMap('main');
    renderMapView();
  } else if(v === 'split'){
    document.getElementById('splitView').style.display = 'flex';
    initMap('main');
    initMap('split');
    renderSplitView();
  }
};

// ── INIT LEAFLET MAP ──
function initMap(type){
  if(type === 'main' && !_mapsInitialized.main){
    _map = L.map('workerMap').setView([20, 0], 2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
      attribution:'© <a href="https://openstreetmap.org">OpenStreetMap</a>',
      maxZoom: 19,
    }).addTo(_map);
    _mapsInitialized.main = true;
  }
  if(type === 'split' && !_mapsInitialized.split){
    _mapSplit = L.map('workerMapSplit').setView([20, 0], 2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
      attribution:'© <a href="https://openstreetmap.org">OpenStreetMap</a>',
      maxZoom: 19,
    }).addTo(_mapSplit);
    _mapsInitialized.split = true;
  }
}

// ── RENDER MAP VIEW ──
function renderMapView(){
  if(!_map) return;

  // Clear existing markers
  _mapMarkers.forEach(m => m.remove());
  _mapMarkers = [];

  // Panel list
  let panelHtml = '';

  const workersWithCoords = _filtered.filter(
    w => w.lat && w.lng
  );

  workersWithCoords.forEach(w => {
    const rating = w.rating ? Number(w.rating).toFixed(1) : '—';
    const city   = [w.city, w.country].filter(Boolean).join(', ') || '—';
    const rate   = w.rate ? 'Rs.'+Number(w.rate).toLocaleString() : 'Negotiable';

    // Custom marker icon
    const icon = L.divIcon({
      className: '',
      html: `<div style="
        background:${w.isOnline ? '#10B981' : '#F43F5E'};
        color:white;font-size:11px;font-weight:700;
        padding:4px 8px;border-radius:999px;
        box-shadow:0 2px 8px rgba(0,0,0,.3);
        white-space:nowrap;border:2px solid white;">
        ${w.isOnline ? '🟢' : '📍'} ${truncate(w.fullName||'Worker',12)}
      </div>`,
      iconSize: [null, null],
      iconAnchor: [0, 20],
    });

    const marker = L.marker([w.lat, w.lng], { icon })
      .addTo(_map)
      .bindPopup(`
        <div class="lf-popup">
          <div class="lf-popup-name">${w.fullName||'Worker'}</div>
          <div class="lf-popup-cat">${w.category||'Skilled Worker'}</div>
          <div style="font-size:12px;color:#9D7589;margin-bottom:8px;">
            📍 ${city} &nbsp;•&nbsp; ⭐ ${rating}
          </div>
          <div class="lf-popup-row">
            <div class="lf-popup-rate">${rate}</div>
            <button class="lf-popup-btn"
                    onclick="openWorkerModal('${w.id}')">
              View Profile
            </button>
          </div>
        </div>
      `, { maxWidth: 220 });

    _mapMarkers.push(marker);

    // Panel item
    panelHtml += `
      <div class="map-worker-item"
           onclick="openWorkerModal('${w.id}');
                    _map.setView([${w.lat},${w.lng}],13);">
        <div class="mwi-avatar">
          ${w.photoURL
            ? `<img src="${w.photoURL}" alt=""
                    onload="this.style.display='block'"
                    onerror="this.style.display='none'"/>👷`
            : '👷'}
        </div>
        <div>
          <div class="mwi-name">${w.fullName||'Worker'}</div>
          <div class="mwi-cat">${w.category||'—'}</div>
          <div class="mwi-rating">⭐ ${rating}</div>
          <div class="mwi-loc">📍 ${city}</div>
        </div>
      </div>`;
  });

  document.getElementById('mapPanelCount').textContent =
    workersWithCoords.length;
  document.getElementById('mapPanelList').innerHTML =
    panelHtml || `<div style="padding:20px;text-align:center;
                               font-size:13px;color:var(--muted);">
      No workers with location data found.
    </div>`;

  // If workers with coords exist, fit bounds
  if(workersWithCoords.length > 0){
    const bounds = L.latLngBounds(
      workersWithCoords.map(w => [w.lat, w.lng])
    );
    _map.fitBounds(bounds, { padding: [40, 40] });
  } else if(window._selectedLat){
    _map.setView([window._selectedLat, window._selectedLon], 10);
  }

  // Invalidate size after display change
  setTimeout(() => _map.invalidateSize(), 200);
}

// ── RENDER SPLIT VIEW ──
function renderSplitView(){
  // Grid side
  const splitGrid = document.getElementById('splitGrid');
  splitGrid.innerHTML = '<div class="workers-grid" id="splitWorkersGrid"></div>';
  renderGrid(document.getElementById('splitWorkersGrid'));

  // Map side
  if(!_mapSplit) return;
  _mapSplitMarkers.forEach(m => m.remove());
  _mapSplitMarkers = [];

  const workersWithCoords = _filtered.filter(w => w.lat && w.lng);
  workersWithCoords.forEach(w => {
    const rating = w.rating ? Number(w.rating).toFixed(1) : '—';
    const icon = L.divIcon({
      className: '',
      html: `<div style="
        background:${w.isOnline ? '#10B981' : '#F43F5E'};
        color:white;font-size:11px;font-weight:700;
        padding:4px 8px;border-radius:999px;
        box-shadow:0 2px 8px rgba(0,0,0,.3);
        white-space:nowrap;border:2px solid white;">
        ${truncate(w.fullName||'Worker',10)}
      </div>`,
      iconSize: [null, null],
      iconAnchor: [0, 20],
    });

    const m = L.marker([w.lat, w.lng], { icon })
      .addTo(_mapSplit)
      .bindPopup(`
        <div class="lf-popup">
          <div class="lf-popup-name">${w.fullName||'Worker'}</div>
          <div class="lf-popup-cat">${w.category||'Skilled Worker'}</div>
          <div style="font-size:12px;color:#9D7589;margin-bottom:8px;">
            ⭐ ${rating}
          </div>
          <button class="lf-popup-btn"
                  onclick="openWorkerModal('${w.id}')">
            View Profile
          </button>
        </div>
      `, { maxWidth: 200 });
    _mapSplitMarkers.push(m);
  });

  if(workersWithCoords.length > 0){
    const bounds = L.latLngBounds(
      workersWithCoords.map(w => [w.lat, w.lng])
    );
    _mapSplit.fitBounds(bounds, { padding: [30, 30] });
  }
  setTimeout(() => _mapSplit.invalidateSize(), 200);
}

// ── LOADING SKELETON ──
function showLoadingSkeleton(){
  const grid = document.getElementById('workersGrid');
  grid.innerHTML = Array(8).fill(`
    <div class="skeleton-card">
      <div class="skel sk-cover"></div>
      <div class="sk-body">
        <div class="skel sk-line"></div>
        <div class="skel sk-line sm"></div>
        <div class="skel sk-line xs"></div>
      </div>
    </div>`).join('');
  document.getElementById('resultsCount').textContent = 'Searching...';
}

// ── NAVIGATION ──
window.goToChat = function(wid){
  const uid = localStorage.getItem('ds_uid');
  if(!uid){
    showToast('⚠️ Please login to message workers.');
    setTimeout(()=>
      window.location.href='../auth/login.html', 1500);
    return;
  }
  window.location.href = `../pages/chat.html?worker=${wid}`;
};

window.goPostJobFor = function(wid, wname){
  const uid = localStorage.getItem('ds_uid');
  if(!uid){
    showToast('⚠️ Please login to post a job.');
    setTimeout(()=>
      window.location.href='../auth/login.html', 1500);
    return;
  }
  window.location.href =
    `../pages/post-job.html?worker=${wid}&wname=${encodeURIComponent(wname)}`;
};

window.goChat = function(){
  if(!_currentWorker) return;
  goToChat(_currentWorker.id);
};

window.goPostJob = function(){
  if(!_currentWorker) return;
  goPostJobFor(_currentWorker.id, _currentWorker.fullName||'');
};

// ── MOBILE FILTER ──
window.openMobFilter = function(){
  document.getElementById('filterSidebar').classList.add('open');
  document.getElementById('mobOverlay').classList.add('show');
};
window.closeMobFilter = function(){
  document.getElementById('filterSidebar').classList.remove('open');
  document.getElementById('mobOverlay').classList.remove('show');
};

// ── TOAST ──
window.showToast = function(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 4000);
};

// ── HELPERS ──
function truncate(str, max){
  return str.length > max ? str.slice(0,max)+'...' : str;
}
function escapeAttr(str){
  return str.replace(/'/g,"\\'").replace(/"/g,'&quot;');
}
</script>
