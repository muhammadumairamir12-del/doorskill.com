<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DoorSkill — Secure Admin Login</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --rose: #F43F5E; --rose-lt: #FFE4EC; --rose-md: #FB7185;
  --dark: #1A0A14; --mid: #5C3D4E; --muted: #9D7589;
  --border: #F3D6E0; --bg: #FFF5F7;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--dark);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.login-card {
  background: #fff; border-radius: 20px; padding: 40px;
  width: 100%; max-width: 400px;
  box-shadow: 0 24px 60px rgba(0,0,0,0.4);
}
.logo {
  font-family: 'Playfair Display', serif;
  font-size: 28px; font-weight: 900; color: var(--rose);
  text-align: center; margin-bottom: 8px;
}
.logo span { color: var(--dark); }
.subtitle {
  text-align: center; font-size: 13px; color: var(--muted);
  margin-bottom: 32px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.1em;
}
.fgroup { margin-bottom: 20px; }
.fgroup label {
  display: block; font-size: 11px; font-weight: 700;
  color: var(--mid); margin-bottom: 8px;
  text-transform: uppercase; letter-spacing: 0.05em;
}
.fgroup input {
  width: 100%; padding: 14px;
  border: 1.5px solid var(--border); border-radius: 12px;
  font-size: 14px; font-family: 'DM Sans', sans-serif;
  color: var(--dark); transition: all 0.2s; outline: none;
}
.fgroup input:focus {
  border-color: var(--rose); box-shadow: 0 0 0 3px var(--rose-lt);
}
.btn {
  width: 100%; padding: 14px; border: none; border-radius: 12px;
  background: var(--rose); color: #fff;
  font-size: 15px; font-weight: 700; cursor: pointer;
  font-family: 'DM Sans', sans-serif; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn:hover { background: #e0334f; transform: translateY(-2px); }
.btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
.err-box {
  display: none; padding: 12px; background: #FEE2E2; color: #991B1B;
  border-radius: 10px; font-size: 13px; margin-bottom: 20px;
  border-left: 3px solid #EF4444; align-items: center; gap: 8px;
}
.err-box.show { display: flex; }
</style>
</head>
<body>

<div class="login-card">
  <div class="logo">Door<span>Skill</span></div>
  <div class="subtitle">Secure Admin Access</div>

  <div class="err-box" id="errBox">
    <span>⚠️</span> <span id="errMsg"></span>
  </div>

  <form id="loginForm" onsubmit="event.preventDefault(); window.doAdminLogin();">
    <div class="fgroup">
      <label>Admin Email</label>
      <input type="email" id="email" placeholder="admin@doorskill.com" required autocomplete="email"/>
    </div>
    <div class="fgroup">
      <label>Password</label>
      <input type="password" id="pass" placeholder="Enter password" required autocomplete="current-password"/>
    </div>
    <button type="submit" class="btn" id="loginBtn">🔒 Authenticate</button>
  </form>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyDLPAfokHz2ZHdRh8ppAEsdWHCkeloI1g0",
  authDomain: "doorskill-beff1.firebaseapp.com",
  databaseURL: "https://doorskill-beff1-default-rtdb.firebaseio.com",
  projectId: "doorskill-beff1",
  storageBucket: "doorskill-beff1.firebasestorage.app",
});

const auth = getAuth(app);
const db   = getFirestore(app);

window.doAdminLogin = async function() {
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('pass').value;
  const btn   = document.getElementById('loginBtn');
  const err   = document.getElementById('errBox');
  const errMsg= document.getElementById('errMsg');

  if(!email || !pass) return;

  btn.disabled = true;
  btn.innerHTML = '⏳ Verifying...';
  err.classList.remove('show');

  try {
    const cred = await signInWithEmailAndPassword(auth, email, pass);
    const uid = cred.user.uid;

    // Check if user is actually an admin
    let isAdmin = false;
    
    // Check admins collection
    const adminSnap = await getDoc(doc(db,'admins',uid));
    if(adminSnap.exists()) isAdmin = true;

    // Check worker role=admin
    if(!isAdmin){
      const wSnap = await getDoc(doc(db,'workers',uid));
      if(wSnap.exists() && wSnap.data().role === 'admin') isAdmin = true;
    }

    if(isAdmin) {
      localStorage.setItem('ds_role', 'admin');
      btn.style.background = '#10B981';
      btn.innerHTML = '✅ Access Granted';
      setTimeout(() => window.location.href = 'admin.html', 1000);
    } else {
      // Not an admin, logout
      await auth.signOut();
      errMsg.textContent = 'Access Denied: You do not have admin privileges.';
      err.classList.add('show');
      btn.disabled = false;
      btn.innerHTML = '🔒 Authenticate';
    }
  } catch(error) {
    console.error(error);
    errMsg.textContent = error.message;
    err.classList.add('show');
    btn.disabled = false;
    btn.innerHTML = '🔒 Authenticate';
  }
};
</script>
</body>
</html>
